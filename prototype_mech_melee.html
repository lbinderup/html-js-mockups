<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3D Mech Melee Prototype</title>
  <style>
    :root {
      --panel: rgba(8, 12, 16, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --text: #eef4f0;
      --muted: rgba(238, 244, 240, 0.72);
      --accent: #f2cc66;
      --ok: #7ff0a6;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0d1216;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      inset: 18px 18px auto 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      pointer-events: none;
    }

    .panel {
      max-width: min(430px, calc(100vw - 36px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.34);
      padding: 12px 14px;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    .status {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .status b {
      color: var(--text);
      font-weight: 700;
    }

    .keys {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .key {
      color: var(--text);
      font-weight: 800;
    }

    .reticle {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.72);
      transition: background 120ms ease, box-shadow 120ms ease;
    }

    .reticle::before {
      left: 9px;
      top: 0;
      width: 2px;
      height: 20px;
    }

    .reticle::after {
      left: 0;
      top: 9px;
      width: 20px;
      height: 2px;
    }

    .reticle.pickup::before,
    .reticle.pickup::after {
      background: var(--ok);
      box-shadow: 0 0 14px rgba(127, 240, 166, 0.9);
    }

    .prompt {
      position: fixed;
      left: 50%;
      top: calc(50% + 28px);
      transform: translateX(-50%);
      min-height: 18px;
      color: var(--ok);
      font-size: 13px;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    .lock {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }

    .locked .lock {
      opacity: 0;
    }

    @media (max-width: 720px) {
      .hud {
        inset: 10px 10px auto 10px;
        flex-direction: column;
      }

      .panel {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="panel">
      <div class="title">Mech Melee Prototype</div>
      <div class="status">
        <span>Held</span><b id="heldStatus">None</b>
        <span>Action</span><b id="actionStatus">Ready</b>
        <span>Target</span><b id="targetStatus">None</b>
      </div>
    </div>

    <div class="panel">
      <div class="keys">
        <div><span class="key">Click</span> pointer lock</div>
        <div><span class="key">WASD</span> move, <span class="key">mouse</span> look</div>
        <div><span class="key">F</span> pick up looked-at item</div>
        <div><span class="key">V</span> melee with held item</div>
        <div><span class="key">Hold LMB</span> spin, <span class="key">RMB+LMB</span> charge throw</div>
        <div><span class="key">G</span> spawn enemy cluster</div>
      </div>
    </div>
  </div>

  <div id="reticle" class="reticle"></div>
  <div id="prompt" class="prompt"></div>
  <div class="lock">Click the scene to take control</div>

  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";

    const TAU = Math.PI * 2;
    const clock = new THREE.Clock();
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9eb6c4);
    scene.fog = new THREE.Fog(0x9eb6c4, 36, 105);

    const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 260);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const heldStatus = document.getElementById("heldStatus");
    const actionStatus = document.getElementById("actionStatus");
    const targetStatus = document.getElementById("targetStatus");
    const reticle = document.getElementById("reticle");
    const prompt = document.getElementById("prompt");

    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);
    const tmpVec = new THREE.Vector3();
    const tmpVec2 = new THREE.Vector3();
    const tmpQuat = new THREE.Quaternion();

    const input = {
      forward: false,
      back: false,
      left: false,
      right: false,
      meleeQueued: false,
      pickupQueued: false,
      aimHeld: false,
      throwCharging: false,
      spinHeld: false,
      meleeHoldPending: false,
      meleeHoldTime: 0,
    };

    const player = {
      position: new THREE.Vector3(0, 0, 0),
      velocity: new THREE.Vector3(),
      knockback: new THREE.Vector3(),
      airOffset: 0,
      airVelocity: 0,
      yaw: 0,
      moveYaw: 0,
      cameraYaw: 0,
      cameraPitch: 0.18,
      speed: 8.5,
      walkAmount: 0,
      heldItem: null,
      action: null,
      throwCharge: 0,
      meleeCombo: 0,
      comboUntil: 0,
      spinAttack: null,
      beamTrailPoints: [],
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function smoothstep(t) {
      t = clamp(t, 0, 1);
      return t * t * (3 - 2 * t);
    }

    function normalizeAngle(angle) {
      return Math.atan2(Math.sin(angle), Math.cos(angle));
    }

    function heightAt(x, z) {
      return Math.sin(x * 0.13) * 1.25
        + Math.cos(z * 0.11) * 1.1
        + Math.sin((x + z) * 0.07) * 0.85
        + Math.cos((x - z) * 0.19) * 0.28;
    }

    function terrainNormalAt(x, z) {
      const e = 0.35;
      const hL = heightAt(x - e, z);
      const hR = heightAt(x + e, z);
      const hD = heightAt(x, z - e);
      const hU = heightAt(x, z + e);
      return new THREE.Vector3(hL - hR, 2 * e, hD - hU).normalize();
    }

    function createTerrain() {
      const size = 150;
      const segments = 120;
      const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
      geometry.rotateX(-Math.PI / 2);
      const pos = geometry.attributes.position;

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        pos.setY(i, heightAt(x, z));
      }

      geometry.computeVertexNormals();
      const material = new THREE.MeshStandardMaterial({
        color: 0x526f51,
        roughness: 0.92,
        metalness: 0,
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.receiveShadow = true;
      scene.add(mesh);

      const grid = new THREE.GridHelper(size, 30, 0x2d3f33, 0x405c45);
      grid.position.y = 0.05;
      grid.material.opacity = 0.17;
      grid.material.transparent = true;
      scene.add(grid);
    }

    function createLimbSegment(radius, length, color) {
      const geometry = new THREE.CylinderGeometry(radius, radius * 0.78, length, 12);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.58,
        metalness: 0.42,
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.y = -length * 0.5;
      return mesh;
    }

    function createMech() {
      const group = new THREE.Group();
      scene.add(group);
      const upper = new THREE.Group();
      upper.position.y = 2.25;
      group.add(upper);
      const upperPitch = new THREE.Group();
      upper.add(upperPitch);
      const legs = new THREE.Group();
      group.add(legs);

      const dark = 0x4d6268;
      const metal = 0x8d9da1;
      const accent = 0xf2cc66;

      const core = new THREE.Mesh(
        new THREE.SphereGeometry(0.92, 32, 22),
        new THREE.MeshStandardMaterial({ color: 0x62777c, roughness: 0.42, metalness: 0.5 })
      );
      core.scale.set(1.16, 1.0, 0.98);
      core.castShadow = true;
      core.receiveShadow = true;
      upperPitch.add(core);

      const face = new THREE.Mesh(
        new THREE.CylinderGeometry(0.42, 0.42, 0.16, 24),
        new THREE.MeshStandardMaterial({ color: accent, emissive: 0x332100, roughness: 0.28, metalness: 0.2 })
      );
      face.rotation.x = Math.PI / 2;
      face.position.set(0, 0.08, -0.88);
      face.castShadow = true;
      upperPitch.add(face);

      function makeArm(side) {
        const root = new THREE.Group();
        root.position.set(side * 0.88, 0.3, -0.02);
        upperPitch.add(root);

        const shoulder = new THREE.Mesh(
          new THREE.SphereGeometry(0.24, 16, 12),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.5, metalness: 0.45 })
        );
        shoulder.castShadow = true;
        root.add(shoulder);

        const upperArm = createLimbSegment(0.17, 1.12, metal);
        root.add(upperArm);

        const elbow = new THREE.Group();
        elbow.position.y = -1.08;
        root.add(elbow);

        const joint = new THREE.Mesh(
          new THREE.SphereGeometry(0.2, 14, 10),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.5, metalness: 0.45 })
        );
        joint.castShadow = true;
        elbow.add(joint);

        const fore = createLimbSegment(0.15, 1.28, metal);
        elbow.add(fore);

        const hand = new THREE.Mesh(
          new THREE.BoxGeometry(0.34, 0.22, 0.42),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.55, metalness: 0.35 })
        );
        hand.position.y = -1.3;
        hand.castShadow = true;
        elbow.add(hand);

        return { root, elbow, hand };
      }

      function makeLeg(side) {
        const root = new THREE.Group();
        root.position.set(side * 0.52, 2.52, 0.1);
        legs.add(root);

        const upperLeg = createLimbSegment(0.18, 1.08, metal);
        root.add(upperLeg);

        const knee = new THREE.Group();
        knee.position.y = -1.04;
        root.add(knee);

        const joint = new THREE.Mesh(
          new THREE.SphereGeometry(0.18, 14, 10),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.5, metalness: 0.45 })
        );
        joint.castShadow = true;
        knee.add(joint);

        const lower = createLimbSegment(0.16, 1.05, metal);
        knee.add(lower);

        const foot = new THREE.Mesh(
          new THREE.BoxGeometry(0.48, 0.2, 0.78),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.58, metalness: 0.3 })
        );
        foot.position.set(0, -1.03, -0.18);
        foot.castShadow = true;
        knee.add(foot);

        return { root, knee, foot };
      }

      return {
        group,
        upper,
        upperPitch,
        legs,
        core,
        face,
        leftArm: makeArm(-1),
        rightArm: makeArm(1),
        leftLeg: makeLeg(-1),
        rightLeg: makeLeg(1),
      };
    }

    const mech = createMech();

    function createRockMesh() {
      const group = new THREE.Group();
      const rock = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.56, 1),
        new THREE.MeshStandardMaterial({ color: 0x69665e, roughness: 0.96, metalness: 0.03, flatShading: true })
      );
      rock.scale.set(1.18, 0.9, 1.0);
      rock.castShadow = true;
      rock.receiveShadow = true;
      group.add(rock);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.9, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createBeamMesh() {
      const group = new THREE.Group();
      const beam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.11, 0.15, 3.7, 12),
        new THREE.MeshStandardMaterial({ color: 0x9da6a9, roughness: 0.48, metalness: 0.72 })
      );
      beam.position.y = -1.85;
      beam.castShadow = true;
      beam.receiveShadow = true;
      group.add(beam);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.46, 0.36, 0.38),
        new THREE.MeshStandardMaterial({ color: 0x6f787c, roughness: 0.58, metalness: 0.65 })
      );
      head.position.y = 0;
      head.castShadow = true;
      group.add(head);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(1.0, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      collider.position.y = -1.45;
      group.add(collider);
      return group;
    }

    function createBombMesh() {
      const group = new THREE.Group();
      const shell = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 18, 14),
        new THREE.MeshStandardMaterial({ color: 0x25292c, roughness: 0.62, metalness: 0.22 })
      );
      shell.castShadow = true;
      shell.receiveShadow = true;
      group.add(shell);

      const band = new THREE.Mesh(
        new THREE.TorusGeometry(0.37, 0.035, 8, 22),
        new THREE.MeshStandardMaterial({ color: 0xe0b94f, roughness: 0.42, metalness: 0.35 })
      );
      band.rotation.x = Math.PI / 2;
      band.castShadow = true;
      group.add(band);

      const fuse = new THREE.Mesh(
        new THREE.CylinderGeometry(0.045, 0.055, 0.38, 8),
        new THREE.MeshStandardMaterial({ color: 0x5b3b24, roughness: 0.8, metalness: 0.02 })
      );
      fuse.position.y = 0.48;
      fuse.rotation.z = 0.28;
      fuse.castShadow = true;
      group.add(fuse);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createGravitonBallMesh() {
      const group = new THREE.Group();
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(0.48, 24, 16),
        new THREE.MeshStandardMaterial({ color: 0x172235, emissive: 0x2550ff, roughness: 0.28, metalness: 0.35 })
      );
      core.castShadow = true;
      core.receiveShadow = true;
      group.add(core);

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.72, 20, 14),
        new THREE.MeshBasicMaterial({ color: 0x66d9ff, transparent: true, opacity: 0.24, depthWrite: false })
      );
      group.add(glow);

      for (let i = 0; i < 3; i++) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.68 + i * 0.08, 0.018, 8, 42),
          new THREE.MeshBasicMaterial({ color: i === 1 ? 0xffffff : 0x61c7ff, transparent: true, opacity: 0.72 })
        );
        ring.rotation.set(i * 0.65, i * 1.17, i * 0.38);
        group.add(ring);
      }

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(1.05, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createClusterMineMesh() {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.42, 0.52, 0.24, 10),
        new THREE.MeshStandardMaterial({ color: 0x35393a, roughness: 0.62, metalness: 0.34 })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const top = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.3, 0.06, 10),
        new THREE.MeshStandardMaterial({ color: 0x5b6466, roughness: 0.5, metalness: 0.42 })
      );
      top.position.y = 0.15;
      top.castShadow = true;
      group.add(top);

      const diode = new THREE.Mesh(
        new THREE.SphereGeometry(0.07, 10, 8),
        new THREE.MeshBasicMaterial({ color: 0xff2525, transparent: true, opacity: 0.35 })
      );
      diode.position.set(0, 0.21, -0.16);
      diode.userData.isMineDiode = true;
      group.userData.diode = diode;
      group.add(diode);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 10, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createRepulsorPadMesh() {
      const group = new THREE.Group();
      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.72, 0.82, 0.16, 18),
        new THREE.MeshStandardMaterial({ color: 0x283235, roughness: 0.46, metalness: 0.55 })
      );
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      const emitter = new THREE.Mesh(
        new THREE.CylinderGeometry(0.46, 0.56, 0.055, 18),
        new THREE.MeshBasicMaterial({ color: 0x7efcff, transparent: true, opacity: 0.78 })
      );
      emitter.position.y = 0.105;
      group.userData.emitter = emitter;
      group.add(emitter);

      const arrow = new THREE.Mesh(
        new THREE.ConeGeometry(0.13, 0.38, 12),
        new THREE.MeshBasicMaterial({ color: 0xd9ffff, transparent: true, opacity: 0.86 })
      );
      arrow.position.y = 0.38;
      group.add(arrow);

      const rim = new THREE.Mesh(
        new THREE.TorusGeometry(0.66, 0.025, 8, 36),
        new THREE.MeshStandardMaterial({ color: 0xa8f7ff, emissive: 0x164b55, roughness: 0.28, metalness: 0.45 })
      );
      rim.rotation.x = Math.PI / 2;
      rim.position.y = 0.12;
      group.add(rim);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(1.0, 10, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createOilDrumMesh() {
      const group = new THREE.Group();
      const drum = new THREE.Mesh(
        new THREE.CylinderGeometry(0.36, 0.36, 0.85, 18),
        new THREE.MeshStandardMaterial({ color: 0x3b4b4f, roughness: 0.48, metalness: 0.46 })
      );
      drum.castShadow = true;
      drum.receiveShadow = true;
      group.add(drum);

      for (let y of [-0.32, 0.32]) {
        const band = new THREE.Mesh(
          new THREE.TorusGeometry(0.36, 0.025, 8, 24),
          new THREE.MeshStandardMaterial({ color: 0x20282a, roughness: 0.44, metalness: 0.62 })
        );
        band.position.y = y;
        band.rotation.x = Math.PI / 2;
        group.add(band);
      }

      const cap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 0.04, 10),
        new THREE.MeshStandardMaterial({ color: 0x15191a, roughness: 0.35, metalness: 0.5 })
      );
      cap.position.set(0.16, 0.45, 0.12);
      group.add(cap);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.78, 10, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createFireBombMesh() {
      const group = new THREE.Group();
      const shell = new THREE.Mesh(
        new THREE.SphereGeometry(0.38, 16, 12),
        new THREE.MeshStandardMaterial({ color: 0x5a2118, emissive: 0x260900, roughness: 0.45, metalness: 0.18 })
      );
      shell.castShadow = true;
      shell.receiveShadow = true;
      group.add(shell);

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 14, 10),
        new THREE.MeshBasicMaterial({ color: 0xff6a2a, transparent: true, opacity: 0.24, depthWrite: false })
      );
      group.add(glow);

      const wick = new THREE.Mesh(
        new THREE.CylinderGeometry(0.035, 0.045, 0.36, 8),
        new THREE.MeshStandardMaterial({ color: 0x2a1711, roughness: 0.8, metalness: 0.02 })
      );
      wick.position.y = 0.4;
      wick.rotation.z = -0.24;
      group.add(wick);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.78, 10, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createTeslaGeneratorMesh() {
      const group = new THREE.Group();
      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.38, 0.48, 0.24, 14),
        new THREE.MeshStandardMaterial({ color: 0x27343a, roughness: 0.42, metalness: 0.58 })
      );
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      const mast = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07, 0.09, 0.72, 10),
        new THREE.MeshStandardMaterial({ color: 0x9caeb6, roughness: 0.32, metalness: 0.82 })
      );
      mast.position.y = 0.42;
      mast.castShadow = true;
      group.add(mast);

      const coilMaterial = new THREE.MeshBasicMaterial({ color: 0x85eaff, transparent: true, opacity: 0.82 });
      for (let i = 0; i < 4; i++) {
        const coil = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.012, 6, 28), coilMaterial);
        coil.position.y = 0.22 + i * 0.13;
        coil.rotation.x = Math.PI / 2;
        group.add(coil);
      }

      const orb = new THREE.Mesh(
        new THREE.SphereGeometry(0.16, 14, 10),
        new THREE.MeshBasicMaterial({ color: 0xbaf8ff, transparent: true, opacity: 0.9 })
      );
      orb.position.y = 0.86;
      group.userData.teslaOrb = orb;
      group.add(orb);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.82, 10, 8),

    function addPickupOutline(item) {
      item.outlines = [];
      item.mesh.traverse((child) => {
        if (!child.isMesh || !child.geometry || (child.material && child.material.opacity === 0)) return;
        const outline = new THREE.LineSegments(
          new THREE.EdgesGeometry(child.geometry),
          new THREE.LineBasicMaterial({ color: 0x7ff0a6, transparent: true, opacity: 0.95 })
        );
        outline.visible = false;
        child.add(outline);
        item.outlines.push(outline);
      });
    }

    function setPickupOutline(item, visible) {
      if (!item.outlines) return;
      item.outlines.forEach((outline) => {
        outline.visible = visible;
      });
    }

        state: "free",
        embeddedInPillar: false,
        impaledEnemies: [],
        velocity: new THREE.Vector3(),
        spin: new THREE.Vector3(),
      };
      tagItemMeshes(mesh, item);
      addPickupOutline(item);
      mesh.position.set(x, heightAt(x, z) + def.groundOffset, z);
      if (type === "beam") {

    function createRockPillar(x, z, radius = 1.05, height = 5.6) {
      const group = new THREE.Group();
      const material = new THREE.MeshStandardMaterial({
        color: 0x6d6a63,
        roughness: 0.94,
        metalness: 0.02,
        flatShading: true,
      });

      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.72, radius, height, 7), material);
      trunk.position.y = height * 0.5;
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      group.add(trunk);

      const cap = new THREE.Mesh(new THREE.IcosahedronGeometry(radius * 0.92, 1), material);
      cap.scale.set(1.05, 0.55, 0.9);
      cap.position.y = height + radius * 0.16;
      cap.castShadow = true;
      cap.receiveShadow = true;
      group.add(cap);

      for (let i = 0; i < 4; i++) {
        const nub = new THREE.Mesh(new THREE.IcosahedronGeometry(radius * (0.18 + i * 0.025), 0), material);
        const a = i * 1.85 + x * 0.11;
        nub.position.set(Math.cos(a) * radius * 0.74, height * (0.24 + i * 0.14), Math.sin(a) * radius * 0.74);
        nub.scale.set(1.1, 0.9, 0.8);
        nub.castShadow = true;
        nub.receiveShadow = true;
        group.add(nub);
      }

      group.position.set(x, heightAt(x, z), z);
      group.rotation.y = Math.random() * TAU;
      scene.add(group);
      rockPillars.push({ mesh: group, radius, height });
      return group;
    }

    function createDanglingLimb(length, radius, color) {
      const geometry = new THREE.CylinderGeometry(radius, radius * 0.78, length, 8);
      const material = new THREE.MeshStandardMaterial({ color, roughness: 0.78, metalness: 0.06 });
      const limb = new THREE.Mesh(geometry, material);
      limb.castShadow = true;
      limb.receiveShadow = true;
      limb.position.y = -length * 0.5;
      return limb;
    }

    function addCrabLimbs(body, isBluePillar) {
      if (!isBluePillar) return [];
      const color = 0x235aa4;
      const limbs = [];
      for (let i = 0; i < 4; i++) {
        const side = i % 2 ? -1 : 1;
        const row = Math.floor(i / 2) ? 1 : -1;
        const root = new THREE.Group();
        root.position.set(side * 0.48, 0.44, row * 0.38);
        root.rotation.set(0.22, side * 0.28, side * 0.34);
        root.userData.baseRotation = root.rotation.clone();
        root.userData.phase = i * 1.61;
        body.add(root);

        const joint = new THREE.Mesh(
          new THREE.SphereGeometry(0.13, 12, 8),
          new THREE.MeshStandardMaterial({ color: 0x4ea7f2, roughness: 0.58, metalness: 0.12 })
        );
        joint.castShadow = true;
        joint.receiveShadow = true;
        root.add(joint);

        const dangler = createDanglingLimb(0.86, 0.055, color);
        dangler.position.y = -0.43;
        root.add(dangler);

        limbs.push(root);
      }
      return limbs;
    }

    function createExplosiveBugMesh() {
      const bodyMaterial = new THREE.MeshStandardMaterial({
        color: 0xc6342e,
        emissive: 0x220000,
        roughness: 0.48,
        metalness: 0.08,
      });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.48, 18, 12), bodyMaterial);
      mesh.scale.set(1.12, 0.78, 1.0);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.baseColor = 0xc6342e;
      mesh.userData.flashColor = 0xff1919;

      const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0x160808 });
      for (let i = 0; i < 2; i++) {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 6), eyeMaterial);
        eye.position.set(i ? -0.14 : 0.14, 0.1, -0.42);
        mesh.add(eye);
      }

      const legMaterial = new THREE.MeshStandardMaterial({ color: 0x451313, roughness: 0.74, metalness: 0.04 });
      for (let i = 0; i < 6; i++) {
        const side = i % 2 ? -1 : 1;
        const row = Math.floor(i / 2) - 1;
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.028, 0.54, 6), legMaterial);
        leg.position.set(side * 0.42, -0.12, row * 0.22);
        leg.rotation.set(0.75, 0, side * 1.05);
        leg.castShadow = true;
        mesh.add(leg);
      }
      return mesh;
    }

    function animateEnemyLimbs(enemy, t, intensity = 1) {
      for (let i = 0; i < enemy.limbs.length; i++) {
        const limb = enemy.limbs[i];
        if (limb.detached || !limb.parent) continue;
        const base = limb.userData.baseRotation;
        const phase = limb.userData.phase || 0;
        if (enemy.state === "dead") {
          limb.rotation.x = 0.95 + Math.sin(t * 2.2 + phase) * 0.16 * intensity;
          limb.rotation.y = base.y + Math.sin(t * 1.7 + phase) * 0.22 * intensity;
          limb.rotation.z = base.z + Math.cos(t * 2.4 + phase) * 0.26 * intensity;
        } else {
          limb.rotation.x = base.x + Math.sin(t * 2.8 + phase) * 0.04 * intensity;
          limb.rotation.y = base.y + Math.sin(t * 2.1 + phase) * 0.05 * intensity;
          limb.rotation.z = base.z + Math.cos(t * 2.6 + phase) * 0.07 * intensity;
        }
      }
    }

    function createEnemy(x, z, type = "grunt") {
      const isBluePillar = type === "bluePillar";
      const isExplosiveBug = type === "explosiveBug";
      const mesh = isExplosiveBug
        ? createExplosiveBugMesh()
        : new THREE.Mesh(
          isBluePillar ? new THREE.CylinderGeometry(0.42, 0.5, 1.75, 8) : new THREE.ConeGeometry(0.28, 0.9, 3),
          new THREE.MeshStandardMaterial({
            color: isBluePillar ? 0x2f79d0 : 0xb94545,
            emissive: isBluePillar ? 0x061a36 : 0x000000,
            roughness: isBluePillar ? 0.55 : 0.72,
            metalness: isBluePillar ? 0.14 : 0.05,
          })
        );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      const limbs = addCrabLimbs(mesh, isBluePillar);
      const groundOffset = isBluePillar ? 0.88 : isExplosiveBug ? 0.36 : 0.45;
      mesh.position.set(x, heightAt(x, z) + groundOffset, z);
      mesh.rotation.y = Math.random() * TAU;
      scene.add(mesh);
      const enemy = {
        type,
        mesh,
        state: "alive",
        hp: isBluePillar ? 4 : isExplosiveBug ? 2 : 3,
        maxHp: isBluePillar ? 4 : isExplosiveBug ? 2 : 3,
        radius: isBluePillar ? 0.9 : isExplosiveBug ? 0.52 : 0.38,
        groundOffset,
        speed: isBluePillar ? 1.35 : isExplosiveBug ? 2.35 : 2.0,
        stunT: 0,
        velocity: new THREE.Vector3(),
        deathT: 0,
        spin: new THREE.Vector3(),
        impaledOn: null,
        limbs,
        goreStage: 0,
        explosiveFuseHits: 0,
        explosiveFlashT: 0,
      };
      mesh.traverse((child) => {
        child.userData.enemy = enemy;
      });
      enemies.push(enemy);
    }

    function spawnEnemyCluster(count = 50) {
      const forward = new THREE.Vector3(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      const baseAngle = Math.atan2(forward.x, forward.z) + Math.PI + (Math.random() - 0.5) * 1.2;
      const centerDist = 28 + Math.random() * 18;
      const centerX = player.position.x + Math.sin(baseAngle) * centerDist;
      const centerZ = player.position.z + Math.cos(baseAngle) * centerDist;
      for (let i = 0; i < count; i++) {
        const r = Math.sqrt(Math.random()) * 8.5;
        const a = Math.random() * TAU;
        const roll = Math.random();
        createEnemy(centerX + Math.cos(a) * r, centerZ + Math.sin(a) * r, roll < 0.08 ? "explosiveBug" : roll < 0.2 ? "bluePillar" : "grunt");
      }
    }

    for (let i = 0; i < 4; i++) {
      spawnEnemyCluster(50);
    }

    player.position.set(0, heightAt(0, 0), 10);

    const hemi = new THREE.HemisphereLight(0xdbedf4, 0x475438, 1.8);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 2.6);
    sun.position.set(-15, 26, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 75;
    sun.shadow.camera.left = -34;
    sun.shadow.camera.right = 34;
    sun.shadow.camera.top = 34;
    sun.shadow.camera.bottom = -34;
    scene.add(sun);

    function addMarker(x, z, radius, color) {
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius * 0.82, 0.7, 10),
        new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.1 })
      );
      mesh.position.set(x, heightAt(x, z) + 0.35, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
    }

    for (let i = 0; i < 42; i++) {
      const x = Math.sin(i * 17.31) * 55;
      const z = Math.cos(i * 11.77) * 55;
      addMarker(x, z, 0.12 + ((i % 5) * 0.035), i % 2 ? 0x40553d : 0x5d694f);
    }

    const aimLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(new Array(28).fill(0).map(() => new THREE.Vector3())),
      new THREE.LineBasicMaterial({ color: 0xf2cc66, transparent: true, opacity: 0.9 })
    );
    aimLine.visible = false;
    scene.add(aimLine);

    const beamTrail = new THREE.Mesh(
      new THREE.BufferGeometry(),
      new THREE.MeshBasicMaterial({
        color: 0x9fd7ff,
        transparent: true,
        opacity: 0.42,
        side: THREE.DoubleSide,
        depthWrite: false,
      })
    );
    beamTrail.visible = false;
    mech.upperPitch.add(beamTrail);

    function updateBeamTrailMesh() {
      if (player.beamTrailPoints.length < 2) {
        beamTrail.visible = false;
        return;
      }

      const verts = [];
      const indices = [];
      const steps = 5;
      for (let i = 0; i < player.beamTrailPoints.length; i++) {
        const sample = player.beamTrailPoints[i];
        for (let j = 0; j < steps; j++) {
          const a = j / (steps - 1);
          const x = sample.handle.x + (sample.tip.x - sample.handle.x) * a;
          const z = sample.handle.z + (sample.tip.z - sample.handle.z) * a;
          verts.push(x, sample.y, z);
        }

        if (i < player.beamTrailPoints.length - 1) {
          const row = i * steps;
          const next = (i + 1) * steps;
          for (let j = 0; j < steps - 1; j++) {
            indices.push(row + j, row + j + 1, next + j, row + j + 1, next + j + 1, next + j);
          }
        }
      }

      beamTrail.geometry.dispose();
      beamTrail.geometry = new THREE.BufferGeometry();
      beamTrail.geometry.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
      beamTrail.geometry.setIndex(indices);
      beamTrail.visible = true;
    }

    function startAction(type, duration, extra = {}) {
      if (player.action) return false;
      player.action = { type, duration, t: 0, hit: false, ...extra };
      return true;
    }

    function canSpinAttack(item) {
      return item && (item.type === "rock" || item.type === "beam" || item.type === "sawblade");
    }

    function beginSpinAttack() {
      const item = player.heldItem;
      if (!canSpinAttack(item) || player.action || input.aimHeld) return false;
      input.spinHeld = true;
      player.spinAttack = {
        t: 0,
        angle: -player.cameraYaw,
        hitMemory: new Map(),
        sparksAt: 0,
      };
      player.meleeCombo = 0;
      player.comboUntil = 0;
      return true;
    }

    function endSpinAttack() {
      input.spinHeld = false;
      player.spinAttack = null;
    }

    function cancelPendingMeleeHold() {
      input.meleeHoldPending = false;
      input.meleeHoldTime = 0;
    }

    function releasePendingMeleeHold() {
      if (!input.meleeHoldPending) return false;
      cancelPendingMeleeHold();
      if (player.heldItem && !player.action && !input.aimHeld) {
        input.meleeQueued = true;
      }
      return true;
    }

    function updatePendingMeleeHold(dt) {
      if (!input.meleeHoldPending) return;
      if (!canSpinAttack(player.heldItem) || player.action || input.aimHeld) {
        cancelPendingMeleeHold();
        return;
      }

      input.meleeHoldTime += dt;
      if (input.meleeHoldTime >= 0.22) {
        cancelPendingMeleeHold();
        beginSpinAttack();
      }
    }

    function dropHeldItem() {
      const item = player.heldItem;
      if (!item || player.action) return;
      cancelPendingMeleeHold();
      endSpinAttack();

      if (item.type === "heldEnemy") {
        ragdollHeldEnemyItem(item);
        player.throwCharge = 0;
        input.throwCharging = false;
        input.aimHeld = false;
        return;
      }

      const forward = new THREE.Vector3(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      const x = player.position.x + forward.x * 2.2;
      const z = player.position.z + forward.z * 2.2;
      scene.attach(item.mesh);
      item.mesh.position.set(x, heightAt(x, z) + item.def.groundOffset, z);
      item.embeddedInPillar = false;
      if (item.type === "beam") {
        item.mesh.rotation.set(0, -player.cameraYaw, Math.PI / 2);
      } else {
        item.mesh.rotation.set(0.25, -player.cameraYaw, -0.18);
      }
      item.state = "free";
      player.heldItem = null;
      player.throwCharge = 0;
      input.throwCharging = false;
      input.aimHeld = false;
    }

    function pickupOrDrop() {
      if (player.heldItem) {
        dropHeldItem();
        return;
      }
      if (highlightedEnemy && !player.action) {
        pickupEnemy(highlightedEnemy);
        return;
      }
      if (!highlightedItem || player.action) return;
      player.heldItem = highlightedItem;
      player.heldItem.state = "held";
      player.heldItem.deployedMine = false;
      player.heldItem.deployedTesla = false;
      player.heldItem.deployedRepulsor = false;
      player.heldItem.mineTriggered = false;
      setPickupOutline(player.heldItem, false);
      mech.upperPitch.attach(player.heldItem.mesh);
      startAction("pickup", 0.28);
    }

    function beginMelee() {
      if (!player.heldItem || player.action || input.aimHeld || player.spinAttack) return;
      if (player.heldItem.type === "heldEnemy") {
        player.meleeCombo = 0;
        player.comboUntil = 0;
        startAction("melee", 0.58, { comboStep: 0 });
        return;
      }
      if (player.heldItem.type === "beam" || player.heldItem.type === "sawblade") {
        const now = clock.elapsedTime;
        const comboCount = player.heldItem.type === "sawblade" ? 2 : 3;
        player.meleeCombo = now <= player.comboUntil ? (player.meleeCombo + 1) % comboCount : 0;
        player.comboUntil = now + 1.05;
        startAction("melee", player.heldItem.type === "beam" && player.meleeCombo === 2 ? 0.82 : 0.58, { comboStep: player.meleeCombo });
        return;
      }
      player.meleeCombo = 0;
      player.comboUntil = 0;
      startAction("melee", 0.86, { comboStep: 0 });
    }

    function getThrowDirection() {
      const flat = new THREE.Vector3(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      const pitch = clamp(player.cameraPitch, -0.58, 0.72);
      return flat.multiplyScalar(Math.cos(pitch)).add(new THREE.Vector3(0, Math.sin(pitch), 0)).normalize();
    }

    function throwHeldItem(power = 1) {
      const item = player.heldItem;
      if (!item || player.action) return;
      cancelPendingMeleeHold();
      endSpinAttack();

      const worldPos = new THREE.Vector3();
      const worldQuat = new THREE.Quaternion();
      item.mesh.getWorldPosition(worldPos);
      item.mesh.getWorldQuaternion(worldQuat);
      scene.attach(item.mesh);
      item.mesh.position.copy(worldPos);
      item.mesh.quaternion.copy(worldQuat);

      const dir = getThrowDirection();
      item.velocity.copy(item.def.throwVelocity(dir, power));
      if (item.type === "heldEnemy") {
        item.spin.set(5.2, 2.8, 6.4);
        item.state = "thrown";
        item.throwAge = 0;
        projectiles.push(item);
        player.heldItem = null;
        player.throwCharge = 0;
        input.throwCharging = false;
        spawnGoo(worldPos, item.enemyType === "bluePillar" ? 0x52b7ff : 0x9be36f, 8);
        return;
      }
      if (item.type === "sawblade") {
        item.spin.set(0, 0, 24);
      } else if (item.type === "gravitonBall") {
        item.spin.set(5.8, 7.4, 4.6);
      } else {
        item.spin.set(
          item.type === "rock" ? 1.7 : 5.4,
          item.type === "rock" ? 1.2 : 2.0,
          item.type === "rock" ? 0.7 : 8.2
        );
      }
      item.embeddedInPillar = false;
      item.deployedMine = false;
      item.deployedTesla = false;
      item.deployedRepulsor = false;
      item.mineTriggered = false;
      item.state = "thrown";
      item.throwAge = 0;
      item.launchOrigin = player.position.clone();
      item.curveSide = item.type === "sawblade" ? -1 : 0;
      item.spinAngle = 0;
      item.sawFlatSpeed = item.type === "sawblade" ? Math.hypot(item.velocity.x, item.velocity.z) : 0;
      item.sawHeightOffset = item.type === "sawblade" ? clamp(dir.y * 6.5, -0.1, 4.4) : 0;
      if (item.type === "gravitonBall") {
        item.gravitonAge = 0;
        item.gravitonCaptured = [];
        item.gravitonRoll = 0;
        item.velocity.y = 0;
      }
      projectiles.push(item);
      player.heldItem = null;
      player.throwCharge = 0;
      input.throwCharging = false;
      spawnImpact(worldPos, item.type === "rock" ? 0x8a8580 : item.type === "gravitonBall" ? 0x7ddcff : 0xb8c3c7, item.type === "gravitonBall" ? 14 : 8, item.type === "gravitonBall" ? 2.6 : 1.8);
    }

    function spawnImpact(pos, color, count, spread) {
      for (let i = 0; i < count; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.045 + Math.random() * 0.05, 8, 6),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
        );
        mesh.position.copy(pos);
        mesh.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * spread,
          1.5 + Math.random() * 2.8,
          (Math.random() - 0.5) * spread
        );
        mesh.life = 0.6 + Math.random() * 0.35;
        mesh.maxLife = mesh.life;
        scene.add(mesh);
        particles.push(mesh);
      }
    }

    function spawnGoo(pos, color = 0x76d36f, count = 14) {
      for (let i = 0; i < count; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.035 + Math.random() * 0.075, 8, 6),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.88 })
        );
        mesh.position.copy(pos);
        mesh.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 2.8,
          0.8 + Math.random() * 2.7,
          (Math.random() - 0.5) * 2.8
        );
        mesh.life = 0.45 + Math.random() * 0.35;
        mesh.maxLife = mesh.life;
        scene.add(mesh);
        particles.push(mesh);
      }
    }

    function spawnShockwave(pos, radius = 7.2) {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.7, 0.045, 8, 48),
        new THREE.MeshBasicMaterial({ color: 0xffe1a0, transparent: true, opacity: 0.78, depthWrite: false })
      );

      ring.position.y = heightAt(pos.x, pos.z) + 0.08;
      ring.rotation.x = Math.PI / 2;

      ring.isShockwave = true;

    function makeOrbitalCylinder(radius, height, color, opacity) {

          color,

    function spawnBulletStreak(pos, direction) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.045, 0.82, 0.045),
        new THREE.MeshBasicMaterial({ color: Math.random() < 0.25 ? 0xffffff : 0xffd36a, transparent: true, opacity: 0.95 })
      );
      mesh.position.copy(pos).add(new THREE.Vector3(0, 10 + Math.random() * 8, 0));
      mesh.velocity = direction.clone().multiplyScalar(13 + Math.random() * 7).add(new THREE.Vector3(0, -38 - Math.random() * 16, 0));
      mesh.rotation.x = 0.25 + Math.random() * 0.18;
      mesh.rotation.z = (Math.random() - 0.5) * 0.4;
      mesh.life = 0.35 + Math.random() * 0.16;
      mesh.maxLife = mesh.life;
      scene.add(mesh);
      particles.push(mesh);
    }

    function disposeObject(root) {
      root.traverse((child) => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      });
    }

    function consumeItem(item) {
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      const itemIndex = items.indexOf(item);
      if (itemIndex >= 0) items.splice(itemIndex, 1);
      if (player.heldItem === item) player.heldItem = null;
      scene.attach(item.mesh);
      scene.remove(item.mesh);
      disposeObject(item.mesh);
      item.state = "spent";
    }

    function ragdollHeldEnemyItem(item, impulse = null) {
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      if (player.heldItem === item) player.heldItem = null;
      const worldPos = new THREE.Vector3();
      const worldQuat = new THREE.Quaternion();
      item.mesh.getWorldPosition(worldPos);
      item.mesh.getWorldQuaternion(worldQuat);
      scene.attach(item.mesh);
      item.mesh.position.copy(worldPos);
      item.mesh.quaternion.copy(worldQuat);
      item.mesh.velocity = impulse ? impulse.clone() : new THREE.Vector3(Math.sin(player.cameraYaw) * 5, 2.8, -Math.cos(player.cameraYaw) * 5);
      item.mesh.spin = new THREE.Vector3((Math.random() - 0.5) * 9, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 9);
      item.mesh.life = 1.15;
      item.mesh.maxLife = item.mesh.life;
      item.mesh.isDebris = true;
      particles.push(item.mesh);
      item.state = "spent";
    }

    function squishHeldEnemyItem(item, pos) {
      const worldPos = pos ? pos.clone() : new THREE.Vector3();
      if (!pos) item.mesh.getWorldPosition(worldPos);
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      if (player.heldItem === item) player.heldItem = null;
      scene.attach(item.mesh);
      scene.remove(item.mesh);
      disposeObject(item.mesh);
      item.state = "spent";
      spawnGoo(worldPos, item.enemyType === "bluePillar" ? 0x52b7ff : 0x9be36f, 28);
      spawnImpact(worldPos, item.enemyType === "bluePillar" ? 0x52b7ff : 0x7fd35f, 14, 2.2);
    }

    function setObjectOpacity(root, opacity) {
      root.traverse((child) => {
        if (!child.material) return;
        child.material.transparent = true;
        child.material.opacity = opacity;
      });
    }

    function releaseImpaledEnemy(enemy, item) {
      const index = item.impaledEnemies ? item.impaledEnemies.indexOf(enemy) : -1;
      if (index >= 0) item.impaledEnemies.splice(index, 1);
      enemy.impaledOn = null;
      enemy.impaleTargetOffset = null;
      enemy.impaleOffset = null;
      enemy.impaleSlideSpeed = 0;
      enemy.impaleSideOffset = 0;
      for (let i = 0; i < item.impaledEnemies.length; i++) {
        const stacked = item.impaledEnemies[i];
        stacked.impaleTargetOffset = JAVELIN_POMMEL_OFFSETS[i];
        stacked.impaleSideOffset = (i % 2 ? -1 : 1) * (0.1 + i * 0.045);
        stacked.mesh.position.z = (i - 1) * 0.14;
      }
    }

    function explodeAt(pos, radius = 7.2, power = 24, knockPlayer = false, sourceItem = null) {
      spawnShockwave(pos, radius);
      spawnImpact(pos, 0xffc15d, 78, 12);
      spawnGoo(pos, 0xff7a35, 42);
      for (const enemy of [...enemies]) {
        if (enemy.state !== "alive") continue;
        const dist = enemy.mesh.position.distanceTo(pos);
        if (dist > radius + enemy.radius) continue;
        const falloff = 1 - clamp(dist / radius, 0, 1);
        const impulse = projectedImpulseFromHit(enemy, pos, new THREE.Vector3(0, 0.5, 0).add(
          enemy.mesh.position.clone().sub(pos).setY(0).normalize().multiplyScalar(power * (0.55 + falloff))
        ));
        if (falloff > 0.38) {
          killEnemy(enemy, impulse, null, 0.45 + falloff * 0.4);
        } else {
          knockEnemy(enemy, impulse, 0.65);
        }
      }

      if (knockPlayer) {
        tmpVec.subVectors(player.position, pos);
        tmpVec.y = 0;
        if (tmpVec.lengthSq() < 0.0001) tmpVec.set(-Math.sin(player.cameraYaw), 0, Math.cos(player.cameraYaw));
        tmpVec.normalize().multiplyScalar(11.5);
        player.knockback.x += tmpVec.x;
        player.knockback.z += tmpVec.z;
      }

      if (sourceItem) consumeItem(sourceItem);
    }

    function removeEnemyImmediately(enemy) {
      if (enemy.impaledOn) releaseImpaledEnemy(enemy, enemy.impaledOn);
      scene.attach(enemy.mesh);
      scene.remove(enemy.mesh);
      disposeObject(enemy.mesh);
      const index = enemies.indexOf(enemy);
      if (index >= 0) enemies.splice(index, 1);
    }

    function setExplosiveBugFlash(enemy, intensity) {
      if (enemy.type !== "explosiveBug" || !enemy.mesh.material) return;
      const hot = intensity > 0.5;
      enemy.mesh.material.color.setHex(hot ? 0xff1919 : 0xc6342e);
      if (enemy.mesh.material.emissive) enemy.mesh.material.emissive.setHex(hot ? 0x8a0000 : 0x220000);
      enemy.mesh.scale.setScalar(1 + intensity * 0.08);
      enemy.mesh.scale.y *= 0.78;
    }

    function updateExplosiveBugFlash(enemy, dt, speed, duty = 0.42) {
      enemy.explosiveFlashT = (enemy.explosiveFlashT || 0) + dt * speed;
      const phase = (Math.sin(enemy.explosiveFlashT * TAU) + 1) * 0.5;
      setExplosiveBugFlash(enemy, phase > 1 - duty ? 1 : 0);
    }

    function explodeExplosiveBug(enemy, pos = null) {
      if (!enemy || enemy.exploded) return false;
      enemy.exploded = true;
      const origin = pos ? pos.clone() : enemy.mesh.position.clone();
      if (enemy.mesh.parent !== scene) enemy.mesh.getWorldPosition(origin);

      spawnShockwave(origin, 5.8);
      spawnImpact(origin, 0xff3030, 68, 7.4);
      spawnGoo(origin, 0xff3b24, 32);

      for (const target of [...enemies]) {
        if (target === enemy || target.state !== "alive") continue;
        const dist = target.mesh.position.distanceTo(origin);
        if (dist > 5.6 + target.radius) continue;
        const falloff = 1 - clamp(dist / 5.6, 0, 1);
        tmpVec.subVectors(target.mesh.position, origin);
        tmpVec.y = 0;
        if (tmpVec.lengthSq() < 0.0001) tmpVec.set(Math.random() - 0.5, 0, Math.random() - 0.5);
        tmpVec.normalize().multiplyScalar(9 + falloff * 11);
        tmpVec.y = 2.4 + falloff * 3.2;
        target.hp -= 2.2 + falloff * 2.0;
        if (target.hp <= 0) {
          killEnemy(target, tmpVec, null, 0.2);
        } else {
          knockEnemy(target, tmpVec, target.type === "bluePillar" ? 1.2 : 0.7);
        }
      }

      tmpVec.subVectors(player.position, origin);
      tmpVec.y = 0;
      const playerDist = tmpVec.length();
      if (playerDist < 5.4) {
        if (tmpVec.lengthSq() < 0.0001) tmpVec.set(-Math.sin(player.cameraYaw), 0, Math.cos(player.cameraYaw));
        tmpVec.normalize().multiplyScalar(8.5 + (1 - playerDist / 5.4) * 7);
        player.knockback.x += tmpVec.x;
        player.knockback.z += tmpVec.z;
      }

      removeEnemyImmediately(enemy);
      return true;
    }

    function makeGroundDisc(pos, radius, color, opacity) {
      const mesh = new THREE.Mesh(
        new THREE.CircleGeometry(radius, 48),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity, depthWrite: false, side: THREE.DoubleSide })
      );
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(pos.x, heightAt(pos.x, pos.z) + 0.035, pos.z);
      mesh.renderOrder = 2;
      scene.add(mesh);
      return mesh;
    }

    function pillarSideNormal(item, pillar) {
      const normal = new THREE.Vector3(
        item.mesh.position.x - pillar.mesh.position.x,
        0,
        item.mesh.position.z - pillar.mesh.position.z
      );
      if (normal.lengthSq() < 0.0001) normal.set(1, 0, 0);
      return normal.normalize();
    }

    function placeItemOnPillarSurface(item, pillar, normal, offset = 0) {
      item.mesh.position.x = pillar.mesh.position.x + normal.x * (pillar.radius + offset);
      item.mesh.position.z = pillar.mesh.position.z + normal.z * (pillar.radius + offset);
      item.mesh.position.y = clamp(item.mesh.position.y, pillar.mesh.position.y + 0.45, pillar.mesh.position.y + pillar.height - 0.25);
      tmpQuat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);
      item.mesh.quaternion.copy(tmpQuat);
      item.embeddedInPillar = true;
    }

    function deployClusterMine(item, pillar = null) {
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      item.velocity.set(0, 0, 0);
      item.spin.set(0, 0, 0);
      item.state = "free";
      item.deployedMine = true;
      item.mineTriggered = false;
      item.mineTriggerT = 0;
      item.mineBlinkT = 0;
      if (pillar) {
        placeItemOnPillarSurface(item, pillar, pillarSideNormal(item, pillar), item.def.groundOffset);
      } else {
        item.mesh.position.y = heightAt(item.mesh.position.x, item.mesh.position.z) + item.def.groundOffset;
        item.mesh.rotation.set(0, Math.random() * TAU, 0);
        item.embeddedInPillar = false;
      }
      setPickupOutline(item, false);
      spawnImpact(item.mesh.position, 0xff4545, 8, 1.4);
    }

    function deployRepulsorPad(item, pillar = null) {
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      item.velocity.set(0, 0, 0);
      item.spin.set(0, 0, 0);
      item.state = "free";
      item.deployedRepulsor = true;
      item.repulsorCooldownT = 0;
      if (pillar) {
        item.repulsorNormal = pillarSideNormal(item, pillar);
        placeItemOnPillarSurface(item, pillar, item.repulsorNormal, item.def.groundOffset);
      } else {
        item.repulsorNormal = terrainNormalAt(item.mesh.position.x, item.mesh.position.z);
        item.mesh.position.copy(new THREE.Vector3(
          item.mesh.position.x,
          heightAt(item.mesh.position.x, item.mesh.position.z),
          item.mesh.position.z
        ).addScaledVector(item.repulsorNormal, item.def.groundOffset));
        item.embeddedInPillar = false;
      }
      tmpQuat.setFromUnitVectors(new THREE.Vector3(0, 1, 0), item.repulsorNormal);
      item.mesh.quaternion.copy(tmpQuat);
      setPickupOutline(item, false);
      spawnImpact(item.mesh.position, 0x7efcff, 12, 1.8);
    }

    function launchPickupFromRepulsor(item, direction, strength) {
      if (item.state !== "free" || item === player.heldItem) return false;
      item.deployedMine = false;
      item.deployedTesla = false;
      item.deployedRepulsor = false;
      item.mineTriggered = false;
      item.embeddedInPillar = false;
      item.state = "thrown";
      item.throwAge = 0;
      item.launchOrigin = item.mesh.position.clone();
      item.curveSide = item.type === "sawblade" ? -1 : item.curveSide;
      item.sawFlatSpeed = item.type === "sawblade" ? Math.hypot(direction.x, direction.z) * strength : 0;
      item.sawHeightOffset = item.type === "sawblade" ? 0.8 : 0;
      item.velocity.copy(direction).multiplyScalar(strength);
      item.spin.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 14, (Math.random() - 0.5) * 12);
      if (!projectiles.includes(item)) projectiles.push(item);
      scene.attach(item.mesh);
      setPickupOutline(item, false);
      return true;
    }

    function isInRepulsorTrigger(pad, targetPos, radius = 0.45) {
      const direction = (pad.repulsorNormal || terrainNormalAt(pad.mesh.position.x, pad.mesh.position.z)).clone().normalize();
      const offset = targetPos.clone().sub(pad.mesh.position);
      const along = offset.dot(direction);
      if (along < -0.35 || along > 1.65 + radius) return false;
      offset.addScaledVector(direction, -along);
      return offset.lengthSq() <= (1.15 + radius) * (1.15 + radius);
    }

    function boostThrownItemFromRepulsor(item, direction) {
      if (item.state !== "thrown" || !item.velocity) return false;
      const boost = item.type === "rock" || item.type === "oilDrum" ? 22 : 20;
      item.velocity.addScaledVector(direction, boost);
      item.spin.add(new THREE.Vector3(
        (Math.random() - 0.5) * 7,
        5 + Math.random() * 6,
        (Math.random() - 0.5) * 7
      ));
      if (item.type === "sawblade") item.sawFlatSpeed = Math.max(item.sawFlatSpeed || 0, Math.hypot(item.velocity.x, item.velocity.z));
      return true;
    }

    function triggerRepulsorPad(item) {
      item.repulsorCooldownT = 0.5;
      const direction = (item.repulsorNormal || terrainNormalAt(item.mesh.position.x, item.mesh.position.z)).clone().normalize();
      const origin = item.mesh.position.clone();
      const blastOrigin = origin.clone().addScaledVector(direction, 0.35);
      const emitter = item.mesh.userData.emitter;
      if (emitter && emitter.material) emitter.material.opacity = 1.0;
      spawnImpact(blastOrigin, 0x9fffff, 34, 3.2);
      spawnShockwave(blastOrigin, 3.6);
      const launchedPickups = new Set();

      for (const enemy of enemies) {
        if (enemy.state !== "alive" || enemy.impaledOn) continue;
        if (enemy.mesh.position.distanceTo(origin) > 1.55 + enemy.radius) continue;
        tmpVec.copy(direction).multiplyScalar(enemy.type === "bluePillar" ? 22.5 : 27);
        knockEnemy(enemy, tmpVec, 4.0);
        enemy.repulsorAirborne = true;
      }

      if (player.position.distanceTo(origin) <= 1.8) {
        player.knockback.x += direction.x * 30;
        player.knockback.z += direction.z * 30;
        player.airVelocity = Math.max(player.airVelocity || 0, Math.max(5, direction.y * 27));
        player.airOffset = Math.max(player.airOffset || 0, 0.06);
      }

      for (const pickup of items) {
        if (pickup === item || pickup.state !== "free" || pickup === player.heldItem) continue;
        if (pickup.mesh.position.distanceTo(origin) > 1.7) continue;
        if (launchPickupFromRepulsor(pickup, direction, pickup.type === "rock" ? 27 : 24)) launchedPickups.add(pickup);
      }

      for (const projectile of projectiles) {
        if (projectile === item || projectile === player.heldItem || projectile.state !== "thrown" || launchedPickups.has(projectile)) continue;
        if (!isInRepulsorTrigger(item, projectile.mesh.position, projectile.def.groundOffset || 0.45)) continue;
        boostThrownItemFromRepulsor(projectile, direction);
      }
    }

    function spawnMineBomblets(pos) {
      for (let i = 0; i < 6; i++) {
        const a = i * TAU / 6;
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.13, 10, 8),
          new THREE.MeshStandardMaterial({ color: 0x2a2b2c, emissive: 0x330000, roughness: 0.5, metalness: 0.35 })
        );
        mesh.position.copy(pos).add(new THREE.Vector3(0, 0.25, 0));
        mesh.velocity = new THREE.Vector3(Math.cos(a) * 6.2, 6.4, Math.sin(a) * 6.2);
        mesh.spin = new THREE.Vector3((Math.random() - 0.5) * 8, 8 + Math.random() * 4, (Math.random() - 0.5) * 8);
        mesh.life = 1.0;
        mesh.maxLife = mesh.life;
        mesh.isBomblet = true;
        scene.add(mesh);
        particles.push(mesh);
      }
      spawnImpact(pos, 0xff3535, 14, 2.2);
    }

    function triggerClusterMine(item) {
      if (item.mineTriggered) return;
      item.mineTriggered = true;
      item.mineTriggerT = 0;
      item.mineBlinkT = 0;
      spawnImpact(item.mesh.position, 0xff2525, 10, 1.6);
    }

    function deployTeslaGenerator(item, pillar = null) {
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      item.velocity.set(0, 0, 0);
      item.spin.set(0, 0, 0);
      item.state = "free";
      item.deployedTesla = true;
      item.teslaPulseT = 0;
      item.teslaCooldowns = new Map();
      item.teslaRelayArcs = new Map();
      if (pillar) {
        placeItemOnPillarSurface(item, pillar, pillarSideNormal(item, pillar), item.def.groundOffset);
      } else {
        item.mesh.position.y = heightAt(item.mesh.position.x, item.mesh.position.z) + item.def.groundOffset;
        item.mesh.rotation.set(0, Math.random() * TAU, 0);
        item.embeddedInPillar = false;
      }
      setPickupOutline(item, false);
      spawnImpact(item.mesh.position, 0x85eaff, 14, 2.0);
    }

    function teslaGeneratorSourceWorld(item) {
      return item.mesh.localToWorld(new THREE.Vector3(0, 0.82, 0));
    }

    function beamPommelWorld(item) {
      return item.mesh.localToWorld(new THREE.Vector3(0, 0, 0));
    }

    function isTeslaMetalItem(item) {
      return item && (item.type === "beam" || item.type === "sawblade");
    }

    function canTeslaRelayItem(item) {
      return isTeslaMetalItem(item) && item.mesh && item.state !== "held" && item.state !== "spent";
    }

    function teslaNodeWorld(item) {
      if (item.type === "beam") {
        return beamPommelWorld(item).add(new THREE.Vector3(0, 0.1, 0));
      }
      const pos = new THREE.Vector3();
      item.mesh.getWorldPosition(pos);
      pos.y += 0.18;
      return pos;
    }

    function chargeMetalItem(item, seconds = 5) {
      item.teslaChargeT = Math.max(item.teslaChargeT || 0, seconds);
      item.teslaZapCooldowns = item.teslaZapCooldowns || new Map();
      item.teslaChargeSparkT = Math.min(item.teslaChargeSparkT || 0, 0.11);
    }

    function createTeslaArc(start, end, color = 0x9feaff, life = 0.11) {
      const points = [];
      const steps = 6;
      tmpVec.subVectors(end, start);
      const length = Math.max(tmpVec.length(), 0.001);
      const jitter = Math.min(0.48, length * 0.075);
      for (let i = 0; i <= steps; i++) {
        const a = i / steps;
        const p = start.clone().lerp(end, a);
        if (i > 0 && i < steps) {
          p.x += (Math.random() - 0.5) * jitter;
          p.y += (Math.random() - 0.5) * jitter;
          p.z += (Math.random() - 0.5) * jitter;
        }
        points.push(p);
      }
      const arc = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(points),
        new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.92 })
      );
      arc.velocity = new THREE.Vector3();
      arc.life = life + Math.random() * life * 0.35;
      arc.maxLife = arc.life;
      scene.add(arc);
      particles.push(arc);
      return arc;
    }

    function shockEnemyFromTesla(enemy, source, generator, now) {
      const cooldown = generator.teslaCooldowns || (generator.teslaCooldowns = new Map());
      if (now - (cooldown.get(enemy) || -100) < 0.42) return false;
      cooldown.set(enemy, now);

      enemy.hp -= enemy.type === "bluePillar" ? 0.75 : 1.1;
      tmpVec.subVectors(enemy.mesh.position, source);
      tmpVec.y = 0;
      if (tmpVec.lengthSq() < 0.0001) tmpVec.set(Math.random() - 0.5, 0, Math.random() - 0.5);
      tmpVec.normalize().multiplyScalar(5.4);
      tmpVec.y = 1.7;
      if (enemy.hp <= 0) {
        killEnemy(enemy, tmpVec, null, 0.12);
      } else {
        knockEnemy(enemy, tmpVec, enemy.type === "bluePillar" ? 0.9 : 0.55);
      }
      createTeslaArc(source, enemy.mesh.position.clone().add(new THREE.Vector3(0, enemy.groundOffset * 0.35, 0)), 0xbaf8ff);
      spawnImpact(enemy.mesh.position, 0x9feaff, 5, 1.1);
      return true;
    }

    function shockEnemyFromChargedMetal(enemy, source, item, now) {
      const cooldown = item.teslaZapCooldowns || (item.teslaZapCooldowns = new Map());
      if (now - (cooldown.get(enemy) || -100) < 0.34) return false;
      cooldown.set(enemy, now);

      enemy.hp -= enemy.type === "bluePillar" ? 0.42 : 0.68;
      tmpVec.subVectors(enemy.mesh.position, source);
      tmpVec.y = 0;
      if (tmpVec.lengthSq() < 0.0001) tmpVec.set(Math.random() - 0.5, 0, Math.random() - 0.5);
      tmpVec.normalize().multiplyScalar(item.type === "sawblade" ? 4.7 : 4.0);
      tmpVec.y = 1.25;
      if (enemy.hp <= 0) {
        killEnemy(enemy, tmpVec, null, 0.1);
      } else {
        knockEnemy(enemy, tmpVec, enemy.type === "bluePillar" ? 0.7 : 0.42);
      }
      createTeslaArc(source, enemy.mesh.position.clone().add(new THREE.Vector3(0, enemy.groundOffset * 0.45, 0)), 0xc7fbff, 0.09);
      spawnImpact(enemy.mesh.position, 0x9feaff, 4, 0.85);
      return true;
    }

    function updateTeslaGenerators(dt) {
      for (const generator of items) {
        if (generator.type !== "teslaGenerator" || generator.state !== "free" || !generator.deployedTesla) continue;
        generator.teslaPulseT = (generator.teslaPulseT || 0) + dt;
        const orb = generator.mesh.userData.teslaOrb;
        if (orb) {
          const pulse = 0.55 + Math.max(0, Math.sin(generator.teslaPulseT * 9)) * 0.45;
          orb.scale.setScalar(0.9 + pulse * 0.35);
          if (orb.material) orb.material.opacity = 0.55 + pulse * 0.4;
        }

        const relayRange = 8.4;
        const shockRange = 5.7;
        const relayArcTimes = generator.teslaRelayArcs || (generator.teslaRelayArcs = new Map());
        const sources = [{
          item: generator,
          pos: teslaGeneratorSourceWorld(generator),
          depth: 0,
        }];
        const linkedMetal = new Set();
        for (let depth = 0; depth < 3; depth++) {
          let added = false;
          for (const metal of items) {
            if (!canTeslaRelayItem(metal) || linkedMetal.has(metal)) continue;
            const metalPos = teslaNodeWorld(metal);
            let best = null;
            let bestDist = Infinity;
            for (const source of sources) {
              if (source.depth > depth) continue;
              const dist = source.pos.distanceTo(metalPos);
              if (dist < bestDist) {
                bestDist = dist;
                best = source;
              }
            }
            if (best && bestDist <= relayRange) {
              linkedMetal.add(metal);
              chargeMetalItem(metal, 2.5);
              metal.teslaLinkedFrameT = clock.elapsedTime;
              const relay = { item: metal, pos: metalPos, depth: best.depth + 1 };
              sources.push(relay);
              added = true;
              const lastArc = relayArcTimes.get(metal) || -100;
              if (generator.teslaPulseT - lastArc > 0.09) {
                relayArcTimes.set(metal, generator.teslaPulseT);
                createTeslaArc(best.pos, relay.pos, 0x85eaff, 0.16);
              }
            }
          }
          if (!added) break;
        }

        const now = clock.elapsedTime;
        for (const enemy of enemies) {
          if (enemy.state !== "alive") continue;
          let nearest = null;
          let nearestDist = Infinity;
          for (const source of sources) {
            const dist = source.pos.distanceTo(enemy.mesh.position);
            if (dist < nearestDist) {
              nearestDist = dist;
              nearest = source;
            }
          }
          if (nearest && nearestDist <= shockRange + enemy.radius) {
            shockEnemyFromTesla(enemy, nearest.pos, generator, now);
          }
        }
      }
    }

    function updateChargedMetalItems(dt) {
      const now = clock.elapsedTime;
      for (const item of items) {
        if (!isTeslaMetalItem(item) || !(item.teslaChargeT > 0)) continue;
        item.teslaChargeT = Math.max(0, item.teslaChargeT - dt);
        if (!canTeslaRelayItem(item)) continue;

        const linkedThisFrame = now - (item.teslaLinkedFrameT || -100) < 0.05;
        const source = teslaNodeWorld(item);
        item.teslaChargeSparkT = (item.teslaChargeSparkT || 0) + dt;
        if (item.teslaChargeSparkT > 0.12) {
          item.teslaChargeSparkT = 0;
          spawnImpact(source, 0x9feaff, item.type === "sawblade" ? 3 : 2, 0.9);
        }
        if (linkedThisFrame) continue;

        const zapRadius = item.type === "sawblade" ? 3.15 : 3.6;
        for (const enemy of enemies) {
          if (enemy.state !== "alive") continue;
          if (enemy.mesh.position.distanceTo(source) <= zapRadius + enemy.radius) {
            shockEnemyFromChargedMetal(enemy, source, item, now);
          }
        }
      }
    }

    function spillOilDrum(item) {
      const pos = item.mesh.position.clone();
      pos.y = heightAt(pos.x, pos.z);
      const radius = 6.6;
      const mesh = makeGroundDisc(pos, radius, 0x111719, 0.58);
      oilPatches.push({ pos: pos.clone(), radius, mesh, age: 0, duration: 34, ignited: false });
      spawnImpact(pos, 0x111719, 34, 5.2);
      consumeItem(item);
    }

    function canBurnEnemy(enemy) {
      return !enemy.fireImmune;
    }

    function igniteEnemy(enemy, seconds = 3.4) {
      if (!enemy || enemy.state !== "alive" || !canBurnEnemy(enemy)) return false;
      enemy.burnT = Math.max(enemy.burnT || 0, seconds);
      enemy.nextBurnSpark = 0;
      return true;
    }

    function damageEnemyHeat(enemy, amount, sourcePos = null) {
      if (enemy.state !== "alive") return false;
      enemy.hp -= amount;
      if (enemy.hp <= 0) {
        const impulse = sourcePos
          ? projectedImpulseFromHit(enemy, sourcePos, enemy.mesh.position.clone().sub(sourcePos).setY(0).normalize().multiplyScalar(7))
          : new THREE.Vector3((Math.random() - 0.5) * 5, 2.5, (Math.random() - 0.5) * 5);
        killEnemy(enemy, impulse, null, 0.16);
        return true;
      }
      return false;
    }

    function findOilPatchAt(pos) {
      for (const patch of oilPatches) {
        if (patch.ignited) continue;
        const dx = pos.x - patch.pos.x;
        const dz = pos.z - patch.pos.z;
        if (dx * dx + dz * dz <= patch.radius * patch.radius) return patch;
      }
      return null;
    }

    function createFireField(pos, radius = 5.6, duration = 8.0) {
      const mesh = makeGroundDisc(pos, radius, 0xff5a1f, 0.34);
      fireFields.push({ pos: pos.clone(), radius, duration, age: 0, mesh, lastSpark: 0 });
      spawnShockwave(pos, radius * 1.1);
      spawnImpact(pos, 0xff7a24, 54, radius);
      return mesh;
    }

    function igniteOilPatch(patch, impactPos) {
      patch.ignited = true;
      patch.mesh.material.color.setHex(0x2a1208);
      patch.mesh.material.opacity = 0.28;
      createFireField(patch.pos, patch.radius * 1.05, 9.0);
      spawnImpact(impactPos || patch.pos, 0xffa24a, 48, patch.radius);
    }

    function detonateFireBomb(item, pos = null) {
      const impact = pos ? pos.clone() : item.mesh.position.clone();
      const oilPatch = findOilPatchAt(impact);
      if (oilPatch) {
        igniteOilPatch(oilPatch, impact);
      }

      for (const enemy of enemies) {
        if (enemy.state !== "alive") continue;
        if (enemy.mesh.position.distanceTo(impact) > 3.2 + enemy.radius) continue;
        igniteEnemy(enemy, 4.0);
        damageEnemyHeat(enemy, 0.55, impact);
      }
      consumeItem(item);
    }

    function updateDeployedMines(dt) {
      for (const item of [...items]) {
        if (item.type !== "clusterMine" || item.state !== "free" || !item.deployedMine) continue;
        item.mineBlinkT = (item.mineBlinkT || 0) + dt;
        const diode = item.mesh.userData.diode;
        if (diode && diode.material) {
          const pulseSpeed = item.mineTriggered ? 24.0 : 3.0;
          const pulse = 0.25 + Math.max(0, Math.sin(item.mineBlinkT * pulseSpeed)) * 0.75;
          diode.material.opacity = 0.25 + pulse * 0.65;
          diode.scale.setScalar(0.85 + pulse * 0.45);
        }
        if (item.mineTriggered) {
          item.mineTriggerT = (item.mineTriggerT || 0) + dt;
          if (item.mineTriggerT >= 1.0) {
            const pos = item.mesh.position.clone();
            spawnMineBomblets(pos);
            consumeItem(item);
          }
          continue;
        }
        for (const enemy of enemies) {
          if (enemy.state !== "alive") continue;
          if (enemy.mesh.position.distanceTo(item.mesh.position) <= 1.35 + enemy.radius) {
            triggerClusterMine(item);
            break;
          }
        }
      }
    }

    function updateRepulsorPads(dt) {
      for (const item of items) {
        if (item.type !== "repulsorPad" || item.state !== "free" || !item.deployedRepulsor) continue;
        item.repulsorCooldownT = Math.max(0, (item.repulsorCooldownT || 0) - dt);
        const emitter = item.mesh.userData.emitter;
        if (emitter && emitter.material) {
          const readyPulse = item.repulsorCooldownT <= 0 ? 0.35 + Math.max(0, Math.sin(clock.elapsedTime * 5.5)) * 0.35 : 0.18;
          emitter.material.opacity = emitter.material.opacity * Math.pow(0.04, dt) + readyPulse * (1 - Math.pow(0.04, dt));
          emitter.scale.setScalar(item.repulsorCooldownT <= 0 ? 1.0 + readyPulse * 0.14 : 0.88);
        }
        if (item.repulsorCooldownT > 0) continue;

        let shouldTrigger = player.position.distanceTo(item.mesh.position) <= 1.8;
        if (!shouldTrigger) {
          for (const enemy of enemies) {
            if (enemy.state !== "alive" || enemy.impaledOn) continue;
            if (enemy.mesh.position.distanceTo(item.mesh.position) <= 1.55 + enemy.radius) {
              shouldTrigger = true;
              break;
            }
          }
        }
        if (!shouldTrigger) {
          for (const projectile of projectiles) {
            if (projectile === item || projectile === player.heldItem || projectile.state !== "thrown") continue;
            if (isInRepulsorTrigger(item, projectile.mesh.position, projectile.def.groundOffset || 0.45)) {
              shouldTrigger = true;
              break;
            }
          }
        }
        if (!shouldTrigger) {
          for (const pickup of items) {
            if (pickup === item || pickup.state !== "free" || pickup === player.heldItem) continue;
            if (pickup.mesh.position.distanceTo(item.mesh.position) <= 1.7) {
              shouldTrigger = true;
              break;
            }
          }
        }
        if (shouldTrigger) triggerRepulsorPad(item);
      }
    }

    function enemyOilSlowMultiplier(enemy) {
      let slow = 1;
      for (const patch of oilPatches) {
        if (patch.ignited) continue;
        const dx = enemy.mesh.position.x - patch.pos.x;
        const dz = enemy.mesh.position.z - patch.pos.z;
        if (dx * dx + dz * dz <= patch.radius * patch.radius) slow = Math.min(slow, 0.38);
      }
      return slow;
    }

    function updateHazards(dt) {
      for (let i = oilPatches.length - 1; i >= 0; i--) {
        const patch = oilPatches[i];
        patch.age += dt;
        const fade = clamp(1 - Math.max(0, patch.age - patch.duration + 5) / 5, 0, 1);
        patch.mesh.material.opacity = (patch.ignited ? 0.22 : 0.58) * fade;
        if (patch.age > patch.duration) {
          scene.remove(patch.mesh);
          disposeObject(patch.mesh);
          oilPatches.splice(i, 1);
        }
      }

      for (let i = fireFields.length - 1; i >= 0; i--) {
        const field = fireFields[i];
        field.age += dt;
        const fade = clamp(1 - field.age / field.duration, 0, 1);
        field.mesh.material.opacity = 0.34 * fade;
        field.mesh.scale.setScalar(1 + Math.sin(field.age * 8) * 0.025);
        if (field.age - field.lastSpark > 0.08) {
          field.lastSpark = field.age;
          const a = Math.random() * TAU;
          const r = Math.sqrt(Math.random()) * field.radius;
          spawnImpact(new THREE.Vector3(field.pos.x + Math.cos(a) * r, heightAt(field.pos.x, field.pos.z) + 0.15, field.pos.z + Math.sin(a) * r), 0xff6a24, 2, 1.2);
        }
        for (const enemy of enemies) {
          if (enemy.state !== "alive") continue;
          const dx = enemy.mesh.position.x - field.pos.x;
          const dz = enemy.mesh.position.z - field.pos.z;
          if (dx * dx + dz * dz > (field.radius + enemy.radius) * (field.radius + enemy.radius)) continue;
          igniteEnemy(enemy, 2.4);
          damageEnemyHeat(enemy, dt * 0.58, field.pos);
        }
        if (field.age > field.duration) {
          scene.remove(field.mesh);
          disposeObject(field.mesh);
          fireFields.splice(i, 1);
        }
      }
    }

    function deployOrbitalBeacon(item) {
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      setPickupOutline(item, false);
      item.velocity.set(0, 0, 0);
      item.spin.set(0, 0, 0);
      item.state = "beacon";
      item.mesh.position.y = heightAt(item.mesh.position.x, item.mesh.position.z) + item.def.groundOffset;
      scene.attach(item.mesh);

      const pos = item.mesh.position.clone();
      const radius = 5.8;
      const lift = makeOrbitalCylinder(radius, 72, 0xbcefff, 0);
      lift.position.set(pos.x, pos.y + 36, pos.z);
      const laser = makeOrbitalCylinder(radius * 0.34, 92, 0xffffff, 0);
      laser.position.set(pos.x, pos.y + 46, pos.z);

      orbitalStrikes.push({
        item,
        pos,
        radius,
        t: 0,
        lift,
        laser,
        lastSpark: 0,
        blasted: false,
      });
      spawnImpact(pos, 0x9fd7ff, 16, 2.2);
    }

    function updateOrbitalStrikes(dt) {
      for (let i = orbitalStrikes.length - 1; i >= 0; i--) {
        const strike = orbitalStrikes[i];
        strike.t += dt;
        const flashPhase = strike.t < 1.15;
        const liftPhase = strike.t >= 1.15 && strike.t < 3.85;
        const laserPhase = strike.t >= 3.85 && strike.t < 4.75;
        const fadePhase = strike.t >= 4.75;

        const flash = flashPhase ? (Math.sin(strike.t * 64) > 0 ? 1 : 0.18) : 0.55;
        strike.item.mesh.scale.setScalar(flashPhase ? 1 + flash * 0.22 : 1);
        strike.item.mesh.traverse((child) => {
          if (child.material && child.material.emissive) child.material.emissive.setHex(flashPhase && flash > 0.5 ? 0x66ddff : 0x1a7aff);
        });

        strike.lift.material.opacity = liftPhase ? 0.16 + Math.sin(strike.t * 18) * 0.04 : laserPhase ? 0.08 : Math.max(0, strike.lift.material.opacity - dt * 0.6);
        strike.lift.rotation.y += dt * 0.8;
        strike.laser.material.opacity = laserPhase ? 0.9 : Math.max(0, strike.laser.material.opacity - dt * 2.4);

        if (flashPhase && strike.t - strike.lastSpark > 0.08) {
          strike.lastSpark = strike.t;
          spawnImpact(strike.pos, 0x9fd7ff, 5, 1.4);
        }

        if (liftPhase || laserPhase) {
          for (const enemy of enemies) {
            if (enemy.state !== "alive") continue;
            const dx = enemy.mesh.position.x - strike.pos.x;
            const dz = enemy.mesh.position.z - strike.pos.z;
            const distSq = dx * dx + dz * dz;
            if (distSq > strike.radius * strike.radius) continue;
            enemy.orbitalControl = true;
            enemy.stunT = Math.max(enemy.stunT || 0, 0.15);
            if (liftPhase) {
              const pull = 1 - Math.sqrt(distSq) / strike.radius;
              enemy.mesh.position.x += (strike.pos.x - enemy.mesh.position.x) * dt * 0.65;
              enemy.mesh.position.z += (strike.pos.z - enemy.mesh.position.z) * dt * 0.65;
              enemy.mesh.position.y += (5.8 + pull * 4.8) * dt;
              enemy.mesh.position.y = Math.min(enemy.mesh.position.y, strike.pos.y + 12.5 + pull * 4);
              enemy.velocity.set(0, 0, 0);
            } else {
              tmpVec.set(dx, 0, dz);
              if (tmpVec.lengthSq() < 0.001) tmpVec.set(Math.random() - 0.5, 0, Math.random() - 0.5);
              tmpVec.normalize().multiplyScalar(20 + Math.random() * 8);
              killEnemy(enemy, tmpVec, null, 0.18);
            }
          }

          for (const item of items) {
            if (item.state !== "free") continue;
            const dx = item.mesh.position.x - strike.pos.x;
            const dz = item.mesh.position.z - strike.pos.z;
            const distSq = dx * dx + dz * dz;
            if (distSq > strike.radius * strike.radius) continue;
            if (liftPhase) {
              item.mesh.position.x += (strike.pos.x - item.mesh.position.x) * dt * 0.4;
              item.mesh.position.z += (strike.pos.z - item.mesh.position.z) * dt * 0.4;
              item.mesh.position.y += 4.5 * dt;
            } else {
              tmpVec.set(dx, 0, dz);
              if (tmpVec.lengthSq() < 0.001) tmpVec.set(Math.random() - 0.5, 0, Math.random() - 0.5);
              tmpVec.normalize();
              item.velocity.copy(tmpVec.multiplyScalar(12 + Math.random() * 8)).add(new THREE.Vector3(0, 3.2, 0));
              item.state = "thrown";
              item.throwAge = 0;
