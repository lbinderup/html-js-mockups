              projectiles.push(item);
            }
          }
        }

        if (laserPhase && !strike.blasted) {
          strike.blasted = true;
          spawnShockwave(strike.pos, strike.radius * 1.45);
          spawnImpact(strike.pos.clone().add(new THREE.Vector3(0, 6, 0)), 0xffffff, 120, 10);
        }

        if (fadePhase && strike.t > 5.35) {
          scene.remove(strike.lift);
          scene.remove(strike.laser);
          disposeObject(strike.lift);
          disposeObject(strike.laser);
          consumeItem(strike.item);
          orbitalStrikes.splice(i, 1);
        }
      }
    }

    function deployAirstrikeBeacon(item) {
      const projectileIndex = projectiles.indexOf(item);
      if (projectileIndex >= 0) projectiles.splice(projectileIndex, 1);
      setPickupOutline(item, false);
      item.velocity.set(0, 0, 0);
      item.spin.set(0, 0, 0);
      item.state = "airstrike";
      item.mesh.position.y = heightAt(item.mesh.position.x, item.mesh.position.z) + item.def.groundOffset;
      scene.attach(item.mesh);

      const end = item.mesh.position.clone();
      const start = (item.launchOrigin || player.position).clone();
      start.y = heightAt(start.x, start.z) + 0.1;
      tmpVec.subVectors(end, start);
      tmpVec.y = 0;
      let length = tmpVec.length();
      if (length < 5) {
        tmpVec.set(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
        length = 12;
        start.copy(end).addScaledVector(tmpVec, -length);
      }
      const dir = tmpVec.normalize().clone();
      const right = new THREE.Vector3(dir.z, 0, -dir.x);
      const drone = createAirstrikeDrone();
      drone.rotation.y = Math.atan2(dir.x, dir.z);

      airstrikes.push({
        item,
        start,
        end,
        dir,
        right,
        length,
        width: 8.5,
        t: 0,
        duration: 3.4,
        lastBurst: 0,
        drone,
        hitEnemies: new Set(),
      });
      spawnImpact(end, 0xffb34d, 18, 2.2);
    }

    function updateAirstrikes(dt) {
      for (let i = airstrikes.length - 1; i >= 0; i--) {
        const strike = airstrikes[i];
        strike.t += dt;
        const activeT = Math.max(0, strike.t - 0.45);
        const progress = clamp(activeT / strike.duration, 0, 1);
        const center = strike.start.clone().addScaledVector(strike.dir, strike.length * progress);
        center.y = heightAt(center.x, center.z);

        const dronePos = center.clone().addScaledVector(strike.dir, -10).add(new THREE.Vector3(0, 24, 0));
        strike.drone.position.lerp(dronePos, 1 - Math.pow(0.0002, dt));
        strike.drone.rotation.y = Math.atan2(strike.dir.x, strike.dir.z);
        strike.drone.rotation.z = Math.sin(strike.t * 8) * 0.05;

        if (strike.t > 0.45 && strike.t - strike.lastBurst > 0.045) {
          strike.lastBurst = strike.t;
          for (let n = 0; n < 9; n++) {
            const along = (Math.random() - 0.5) * 3.6;
            const across = (Math.random() - 0.5) * strike.width;
            const p = center.clone()
              .addScaledVector(strike.dir, along)
              .addScaledVector(strike.right, across);
            p.y = heightAt(p.x, p.z) + 0.25;
            spawnBulletStreak(p, strike.dir);
            if (Math.random() < 0.55) spawnImpact(p, 0xffd36a, 3, 1.0);
          }
        }

        for (const enemy of enemies) {
          if (enemy.state !== "alive" || strike.hitEnemies.has(enemy)) continue;
          tmpVec.subVectors(enemy.mesh.position, strike.start);
          tmpVec.y = 0;
          const along = tmpVec.dot(strike.dir);
          const across = Math.abs(tmpVec.dot(strike.right));
          const bandCenter = strike.length * progress;
          if (along < 0 || along > strike.length || Math.abs(along - bandCenter) > 2.2 || across > strike.width * 0.55) continue;
          strike.hitEnemies.add(enemy);
          const impulse = strike.dir.clone().multiplyScalar(8 + Math.random() * 5).add(new THREE.Vector3(0, 2.2, 0));
          killEnemy(enemy, impulse, null, 0.16);
          spawnImpact(enemy.mesh.position, 0xffd36a, 12, 2.6);
        }

        if (strike.t > strike.duration + 1.0) {
          scene.remove(strike.drone);
          disposeObject(strike.drone);
          consumeItem(strike.item);
          airstrikes.splice(i, 1);
        }
      }
    }

    function detachEnemyLimb(enemy) {
      const limb = enemy.limbs.find((candidate) => !candidate.detached && candidate.parent);
      if (!limb) return false;

      const worldPos = new THREE.Vector3();
      limb.getWorldPosition(worldPos);
      limb.detached = true;
      scene.attach(limb);
      limb.position.copy(worldPos);
      limb.velocity = new THREE.Vector3((Math.random() - 0.5) * 2.4, 1.2 + Math.random() * 1.8, (Math.random() - 0.5) * 2.4);
      limb.spin = new THREE.Vector3((Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7);
      limb.life = 0.9 + Math.random() * 0.45;
      limb.maxLife = limb.life;
      limb.isDebris = true;
      particles.push(limb);
      spawnGoo(worldPos, enemy.type === "bluePillar" ? 0x52b7ff : 0x7fd35f, 12);
      return true;
    }

    function squishImpaledEnemy(enemy, item) {
      const worldPos = new THREE.Vector3();
      enemy.mesh.getWorldPosition(worldPos);
      releaseImpaledEnemy(enemy, item);
      scene.attach(enemy.mesh);
      scene.remove(enemy.mesh);
      disposeObject(enemy.mesh);
      const index = enemies.indexOf(enemy);
      if (index >= 0) enemies.splice(index, 1);
      spawnGoo(worldPos, enemy.type === "bluePillar" ? 0x52b7ff : 0x9be36f, 26);
      spawnImpact(worldPos, enemy.type === "bluePillar" ? 0x52b7ff : 0x7fd35f, 10, 1.6);
    }

    function createEnemyTopChunk(enemy) {
      const isBlue = enemy.type === "bluePillar";
      const geometry = isBlue ? new THREE.CylinderGeometry(0.38, 0.43, 0.72, 8) : new THREE.ConeGeometry(0.24, 0.45, 3);
      const material = enemy.mesh.material.clone();
      const chunk = new THREE.Mesh(geometry, material);
      chunk.castShadow = true;
      chunk.receiveShadow = true;
      chunk.position.copy(enemy.mesh.position);
      chunk.position.y += isBlue ? 0.42 : 0.24;
      chunk.rotation.copy(enemy.mesh.rotation);
      return chunk;
    }

    function dismemberEnemy(enemy, hitPoint, impulse) {
      if (enemy.state !== "alive") return false;
      if (enemy.type === "explosiveBug") {
        return explodeExplosiveBug(enemy, hitPoint);
      }

      tmpVec.subVectors(enemy.mesh.position, hitPoint);
      tmpVec.y = 0;
      if (tmpVec.lengthSq() < 0.0001) {
        tmpVec.copy(impulse);
        tmpVec.y = 0;
      }
      if (tmpVec.lengthSq() < 0.0001) tmpVec.set(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      tmpVec.normalize();
      const away = tmpVec.clone();

      enemy.state = "dead";
      enemy.deathT = 0;
      enemy.velocity.copy(away).multiplyScalar(5.5 + Math.random() * 2.5);
      enemy.velocity.y = 1.0 + Math.random() * 1.2;
      enemy.spin.set((Math.random() - 0.5) * 7, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 7);
      enemy.mesh.scale.y *= 0.48;
      enemy.mesh.position.y -= enemy.groundOffset * 0.18;

      const top = createEnemyTopChunk(enemy);
      top.velocity = away.multiplyScalar(5.8 + Math.random() * 3.2).add(new THREE.Vector3(0, 3.9 + Math.random() * 2.0, 0));
      top.spin = new THREE.Vector3((Math.random() - 0.5) * 9, (Math.random() - 0.5) * 12, (Math.random() - 0.5) * 9);
      top.life = 1.2 + Math.random() * 0.55;
      top.maxLife = top.life;
      top.isDebris = true;
      scene.add(top);
      particles.push(top);

      spawnGoo(hitPoint, enemy.type === "bluePillar" ? 0x52b7ff : 0x9be36f, 18);
      spawnImpact(hitPoint, 0xd3e0e4, 12, 2.4);
      return true;
    }

    function damageImpaledEnemiesOnMelee(item) {
      if (!item || item.type !== "beam" || !item.impaledEnemies || item.impaledEnemies.length === 0) return;
      const targets = [...item.impaledEnemies];
      for (const enemy of targets) {
        if (enemy.type === "explosiveBug") {
          enemy.explosiveFuseHits = (enemy.explosiveFuseHits || 0) + 1;
          enemy.explosiveFlashT = 0;
          const worldPos = new THREE.Vector3();
          enemy.mesh.getWorldPosition(worldPos);
          spawnImpact(worldPos, 0xff3030, 8 + enemy.explosiveFuseHits * 2, 1.2 + enemy.explosiveFuseHits * 0.4);
          if (enemy.explosiveFuseHits >= 4) {
            explodeExplosiveBug(enemy, worldPos);
          }
          continue;
        }
        let detached = false;
        for (let i = 0; i < 2; i++) {
          detached = detachEnemyLimb(enemy) || detached;
        }
        enemy.goreStage++;
        if (!detached || enemy.goreStage >= 4) {
          squishImpaledEnemy(enemy, item);
        }
      }
    }

    function addEnemyToJavelin(enemy, item) {
      if (!item.impaledEnemies) item.impaledEnemies = [];
      if (item.impaledEnemies.length >= MAX_JAVELIN_IMPALES) return false;

      const index = item.impaledEnemies.length;
      enemy.impaledOn = item;
      enemy.impaleOffset = JAVELIN_TIP_OFFSET;
      enemy.impaleTargetOffset = JAVELIN_POMMEL_OFFSETS[index];
      enemy.impaleSlideSpeed = 8.5 + index * 0.9;
      enemy.impaleSideOffset = (index % 2 ? -1 : 1) * (0.1 + index * 0.045);
      const worldPos = enemy.mesh.position.clone();
      item.mesh.attach(enemy.mesh);
      enemy.mesh.position.copy(item.mesh.worldToLocal(worldPos));
      enemy.mesh.position.x = enemy.impaleSideOffset;
      enemy.mesh.position.y = enemy.impaleOffset;
      enemy.mesh.position.z = (index - 1) * 0.14;
      enemy.mesh.rotation.set(1.1, 0.2 + index * 0.18, 0.4 - index * 0.12);
      enemy.explosiveFuseHits = enemy.type === "explosiveBug" ? 1 : enemy.explosiveFuseHits;
      enemy.explosiveFlashT = 0;
      item.impaledEnemies.push(enemy);
      return true;
    }

    function killEnemy(enemy, impulse, impaleItem = null, liftScale = 1) {
      if (enemy.state !== "alive") return false;
      if (enemy.type === "explosiveBug" && !impaleItem) {
        return explodeExplosiveBug(enemy, enemy.mesh.position);
      }
      enemy.state = "dead";
      enemy.velocity.copy(impulse);
      enemy.velocity.x *= 1.45;
      enemy.velocity.z *= 1.45;
      enemy.velocity.y = Math.max(enemy.velocity.y, 0) + (9 + Math.random() * 5) * liftScale;
      enemy.spin.set((Math.random() - 0.5) * 18, (Math.random() - 0.5) * 18, (Math.random() - 0.5) * 18);
      enemy.deathT = 0;

      if (impaleItem) {
        addEnemyToJavelin(enemy, impaleItem);
      }
      return true;
    }

    function knockEnemy(enemy, impulse, stunSeconds = 1.2) {
      enemy.velocity.copy(impulse);
      enemy.velocity.y = Math.max(enemy.velocity.y, 2.5);
      enemy.stunT = Math.max(enemy.stunT || 0, stunSeconds);
      enemy.mesh.rotation.y = Math.atan2(enemy.velocity.x, enemy.velocity.z);
    }

    function projectedImpulseFromHit(enemy, center, baseImpulse) {
      const strength = Math.max(baseImpulse.length(), 0.001);
      tmpVec.subVectors(enemy.mesh.position, center);
      tmpVec.y = 0;
      if (tmpVec.lengthSq() < 0.0001) {
        tmpVec.copy(baseImpulse);
        tmpVec.y = 0;
      }
      if (tmpVec.lengthSq() < 0.0001) {
        tmpVec.set(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      }
      tmpVec.normalize().multiplyScalar(strength);
      tmpVec.y = Math.max(baseImpulse.y, strength * 0.18);
      return tmpVec.clone();
    }

    function hitEnemies(center, radius, impulse, impaleItem = null, options = {}) {
      let hits = 0;
      const meleeDamage = options.meleeDamage || 0;
      const deathLiftScale = options.deathLiftScale || 1;
      const stunSeconds = options.stunSeconds || 0.45;
      const dismember = Boolean(options.dismember);
      const javelinHit = Boolean(impaleItem);
      for (const enemy of enemies) {
        if (enemy.state !== "alive") continue;
        if (enemy.mesh.position.distanceTo(center) > radius + enemy.radius) continue;
        const directedImpulse = projectedImpulseFromHit(enemy, center, impulse).multiplyScalar(0.9 + Math.random() * 0.35);
        if (dismember) {
          if (dismemberEnemy(enemy, center, directedImpulse)) hits++;
          continue;
        }

        if (!javelinHit && meleeDamage > 0) {
          enemy.hp -= meleeDamage;
          if (enemy.hp <= 0) {
            if (killEnemy(enemy, directedImpulse, null, deathLiftScale)) hits++;
          } else {
            knockEnemy(enemy, directedImpulse, enemy.type === "bluePillar" ? 1.2 : stunSeconds);
            hits++;
          }
          continue;
        }

        if (javelinHit && impaleItem.impaledEnemies && impaleItem.impaledEnemies.length >= MAX_JAVELIN_IMPALES) {
          knockEnemy(enemy, directedImpulse.multiplyScalar(1.35), 0.55);
          hits++;
          continue;
        }

        if (killEnemy(enemy, directedImpulse, impaleItem, deathLiftScale)) {
          hits++;
        }
      }
      if (hits > 0) spawnImpact(center, impaleItem ? 0x9fd7ff : 0xff7777, Math.min(18, 6 + hits * 2), 3.2);
      return hits;
    }

    function knockEnemiesOnly(center, radius, impulse, stunSeconds = 0.7) {
      let hits = 0;
      for (const enemy of enemies) {
        if (enemy.state !== "alive") continue;
        if (enemy.mesh.position.distanceTo(center) > radius + enemy.radius) continue;
        const directedImpulse = projectedImpulseFromHit(enemy, center, impulse).multiplyScalar(1.0 + Math.random() * 0.25);
        knockEnemy(enemy, directedImpulse, enemy.type === "bluePillar" ? 1.2 : stunSeconds);
        hits++;
      }
      if (hits > 0) spawnImpact(center, 0x7ddcff, Math.min(22, 8 + hits * 3), 4.4);
      return hits;
    }

    function hitSingleEnemy(center, radius, impulse, damage = 2) {
      let best = null;
      let bestDist = Infinity;
      for (const enemy of enemies) {
        if (enemy.state !== "alive") continue;
        const dist = enemy.mesh.position.distanceTo(center);
        if (dist > radius + enemy.radius || dist >= bestDist) continue;
        best = enemy;
        bestDist = dist;
      }
      if (!best) return false;

      const directedImpulse = projectedImpulseFromHit(best, center, impulse).multiplyScalar(1.15);
      best.hp -= damage;
      if (best.hp <= 0) {
        killEnemy(best, directedImpulse, null, 0.3);
      } else {
        knockEnemy(best, directedImpulse, best.type === "bluePillar" ? 1.2 : 0.45);
      }
      spawnImpact(center, 0x9be36f, 10, 2.4);
      return true;
    }

    function javelinTipWorld(item) {
      return item.mesh.localToWorld(new THREE.Vector3(0, JAVELIN_TIP_OFFSET, 0));
    }

    function findPillarHit(item) {
      if (
        item.type !== "beam"
        && item.type !== "bomb"
        && item.type !== "sawblade"
        && item.type !== "repulsorPad"
        && item.type !== "clusterMine"
        && item.type !== "teslaGenerator"
        && item.type !== "rock"
        && item.type !== "beacon"
        && item.type !== "airstrikeBeacon"
        && item.type !== "gravitonBall"
      ) return null;
      const tip = item.type === "beam" ? javelinTipWorld(item) : item.mesh.position;
      for (const pillar of rockPillars) {
        const dx = tip.x - pillar.mesh.position.x;
        const dz = tip.z - pillar.mesh.position.z;
        const y = tip.y - pillar.mesh.position.y;
        if (y < 0.35 || y > pillar.height + 0.7) continue;
        if (dx * dx + dz * dz <= (pillar.radius + 0.42) * (pillar.radius + 0.42)) {
          return pillar;
        }
      }
      return null;
    }

    function knockItemOffPillar(item, pillar) {
      const normal = pillarSideNormal(item, pillar);
      placeItemOnPillarSurface(item, pillar, normal, 0.5);
      const tangent = item.velocity.clone().addScaledVector(normal, -item.velocity.dot(normal));
      item.velocity.copy(tangent.multiplyScalar(0.18)).addScaledVector(normal, 2.2);
      item.velocity.y = Math.min(item.velocity.y, -2.5);
      item.spin.add(new THREE.Vector3((Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7));
      item.embeddedInPillar = false;
      spawnImpact(item.mesh.position, 0xb8c3c7, item.type === "rock" ? 10 : 7, 1.8);
    }

    function reflectGravitonFromPillar(item, pillar) {
      const normal = pillarSideNormal(item, pillar);
      placeItemOnPillarSurface(item, pillar, normal, item.def.groundOffset + 0.5);
      item.mesh.position.y = heightAt(item.mesh.position.x, item.mesh.position.z) + item.def.groundOffset;
      const speed = Math.max(6, Math.hypot(item.velocity.x, item.velocity.z));
      const dot = item.velocity.dot(normal);
      if (dot < 0) item.velocity.addScaledVector(normal, -2 * dot);
      if (Math.hypot(item.velocity.x, item.velocity.z) < 0.001) {
        item.velocity.x = normal.x * speed;
        item.velocity.z = normal.z * speed;
      }
      const flat = Math.hypot(item.velocity.x, item.velocity.z);
      item.velocity.x *= speed / flat;
      item.velocity.z *= speed / flat;
      item.velocity.y = 0;
      item.embeddedInPillar = false;
      item.gravitonPillarBounceT = clock.elapsedTime;
      spawnImpact(item.mesh.position, 0x9feaff, 18, 2.6);
    }

    function embedJavelinInPillar(item, pillar) {
      item.velocity.set(0, 0, 0);
      item.spin.set(0, 0, 0);
      item.state = "free";
      item.embeddedInPillar = true;
      const tip = javelinTipWorld(item);
      const dx = tip.x - pillar.mesh.position.x;
      const dz = tip.z - pillar.mesh.position.z;
      const side = new THREE.Vector3(dx, 0, dz);
      if (side.lengthSq() > 0.0001) {
        side.normalize();
        const desiredTip = new THREE.Vector3(
          pillar.mesh.position.x + side.x * (pillar.radius + 0.18),
          tip.y,
          pillar.mesh.position.z + side.z * (pillar.radius + 0.18)
        );
        item.mesh.position.add(desiredTip.sub(tip));
      }
      spawnImpact(javelinTipWorld(item), 0x9fd7ff, 16, 2.5);
    }

    function embedSawbladeInPillar(item, pillar) {
      item.velocity.set(0, 0, 0);
      item.spin.set(0, 0, 0);
      item.state = "free";
      item.embeddedInPillar = true;
      const dx = item.mesh.position.x - pillar.mesh.position.x;
      const dz = item.mesh.position.z - pillar.mesh.position.z;
      const side = new THREE.Vector3(dx, 0, dz);
      if (side.lengthSq() > 0.0001) {
        side.normalize();
        item.mesh.position.x = pillar.mesh.position.x + side.x * (pillar.radius + 0.22);
        item.mesh.position.z = pillar.mesh.position.z + side.z * (pillar.radius + 0.22);
      }
      spawnImpact(item.mesh.position, 0xd3e0e4, 14, 2.1);
    }

    let highlightedItem = null;
    let highlightedEnemy = null;

    function pickupEnemy(enemy) {
      const enemyIndex = enemies.indexOf(enemy);
      if (enemyIndex >= 0) enemies.splice(enemyIndex, 1);
      enemy.state = "held";
      enemy.velocity.set(0, 0, 0);
      enemy.stunT = 0;

      const item = {
        type: "heldEnemy",
        def: heldEnemyDef,
        mesh: enemy.mesh,
        state: "held",
        enemyType: enemy.type,
        enemy,
        velocity: new THREE.Vector3(),
        spin: new THREE.Vector3(),
      };
      setObjectOpacity(item.mesh, 1);
      mech.upperPitch.attach(item.mesh);
      player.heldItem = item;
      highlightedEnemy = null;
      startAction("pickup", 0.28);
    }

    function updateHighlight() {
      highlightedItem = null;
      highlightedEnemy = null;
      const pickupItems = items.filter((item) => item.state === "free");
      pickupItems.forEach((item) => setPickupOutline(item, false));
      items.forEach((item) => {
        if (item.state !== "free") setPickupOutline(item, false);
      });

      const candidates = pickupItems.map((item) => item.mesh);
      raycaster.setFromCamera(center, camera);
      if (candidates.length > 0) {
        const hits = raycaster.intersectObjects(candidates, true);
        for (const hit of hits) {
          const item = hit.object.userData.item;
          if (!item || item.state !== "free") continue;
          item.mesh.getWorldPosition(tmpVec2);
          if (tmpVec2.distanceTo(player.position) > (item.embeddedInPillar ? 6.8 : 5.2)) continue;
          highlightedItem = item;
          setPickupOutline(item, !player.heldItem);
          break;
        }
      }

      if (highlightedItem || player.heldItem) return;

      raycaster.setFromCamera(center, camera);
      const enemyMeshes = enemies.filter((enemy) => enemy.state === "alive" && enemy.mesh.position.distanceTo(player.position) <= 4.4).map((enemy) => enemy.mesh);
      if (enemyMeshes.length === 0) return;
      const enemyHits = raycaster.intersectObjects(enemyMeshes, true);
      for (const hit of enemyHits) {
        const enemy = hit.object.userData.enemy;
        if (!enemy || enemy.state !== "alive") continue;
        if (enemy.mesh.position.distanceTo(player.position) > 4.4) continue;
        highlightedEnemy = enemy;
        break;
      }
    }

    function updateMovement(dt) {
      const forward = new THREE.Vector3(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      const right = new THREE.Vector3(Math.cos(player.cameraYaw), 0, Math.sin(player.cameraYaw));
      const move = new THREE.Vector3();
      if (input.forward) move.add(forward);
      if (input.back) move.sub(forward);
      if (input.right) move.add(right);
      if (input.left) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize();
        player.velocity.x = move.x * player.speed;
        player.velocity.z = move.z * player.speed;
        player.moveYaw = Math.atan2(move.x, -move.z);
        player.walkAmount += dt * player.speed * 0.72;
      } else {
        player.velocity.x *= Math.pow(0.0008, dt);
        player.velocity.z *= Math.pow(0.0008, dt);
        player.walkAmount += dt * 0.7;
      }

      player.yaw = player.moveYaw;
      if (input.throwCharging) {
        player.throwCharge = clamp(player.throwCharge + dt / 1.15, 0, 1);
      }

      player.position.x += (player.velocity.x + player.knockback.x) * dt;
      player.position.z += (player.velocity.z + player.knockback.z) * dt;
      player.knockback.x *= Math.pow(0.045, dt);
      player.knockback.z *= Math.pow(0.045, dt);
      player.position.x = clamp(player.position.x, -68, 68);
      player.position.z = clamp(player.position.z, -68, 68);
      const groundY = heightAt(player.position.x, player.position.z);
      if (player.airOffset > 0 || player.airVelocity > 0) {
        player.airVelocity -= 22 * dt;
        player.airOffset = Math.max(0, player.airOffset + player.airVelocity * dt);
        if (player.airOffset <= 0 && player.airVelocity < 0) player.airVelocity = 0;
      }
      player.position.y = groundY + player.airOffset;

      const normal = terrainNormalAt(player.position.x, player.position.z);
      mech.group.position.copy(player.position);
      mech.group.rotation.set(0, 0, 0);
      mech.group.position.y = player.position.y + Math.max(0, 0.08 - normal.y * 0.02);
    }

    function setArmPose(arm, x, y, z, elbowX) {
      arm.root.rotation.set(x, y, z);
      arm.elbow.rotation.x = elbowX;
    }

    function updateSpinItemPose(item, t) {
      if (item.type === "beam") {
        setBeamBladePose(item, 1.42, -0.06, -0.28, 1, 0.08, -0.08);
      } else if (item.type === "sawblade") {
        item.mesh.position.set(0, -0.2, -1.52);
        item.mesh.rotation.set(Math.PI / 2, 0, t * 18);
      } else {
        item.mesh.position.set(0, -0.05, -1.56);
        item.mesh.rotation.set(-0.62, t * 1.4, 0);
      }
    }

    function hitSpinEnemies(center, item) {
      const spin = player.spinAttack;
      if (!spin || !item) return;

      const radius = item.type === "beam" ? 2.35 : item.type === "sawblade" ? 1.35 : 1.55;
      const damage = item.type === "rock" ? 1 : 1;
      const force = item.type === "beam" ? 8.2 : item.type === "sawblade" ? 7.8 : 7.0;
      const now = clock.elapsedTime;
      let hits = 0;

      if (item.type === "beam" && item.impaledEnemies && item.impaledEnemies.length && now - (spin.impaledHitAt || 0) > 0.42) {
        spin.impaledHitAt = now;
        damageImpaledEnemiesOnMelee(item);
      }

      for (const enemy of enemies) {
        if (enemy.state !== "alive") continue;
        if (enemy.mesh.position.distanceTo(center) > radius + enemy.radius) continue;
        if (now - (spin.hitMemory.get(enemy) || -100) < 0.28) continue;

        spin.hitMemory.set(enemy, now);
        tmpVec.subVectors(enemy.mesh.position, player.position);
        tmpVec.y = 0;
        if (tmpVec.lengthSq() < 0.0001) tmpVec.subVectors(center, player.position).setY(0);
        if (tmpVec.lengthSq() < 0.0001) tmpVec.set(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
        tmpVec.normalize().multiplyScalar(force);
        tmpVec.y = item.type === "rock" ? 1.7 : 1.1;
        const directedImpulse = projectedImpulseFromHit(enemy, center, tmpVec).multiplyScalar(0.85 + Math.random() * 0.25);

        if (item.type === "sawblade") {
          if (dismemberEnemy(enemy, center, directedImpulse)) hits++;
          continue;
        }

        enemy.hp -= damage;
        if (enemy.hp <= 0) {
          if (killEnemy(enemy, directedImpulse, null, 0.22)) hits++;
        } else {
          knockEnemy(enemy, directedImpulse, enemy.type === "bluePillar" ? 1.2 : 0.38);
          hits++;
        }
      }

      if (hits > 0 && now - spin.sparksAt > 0.08) {
        spin.sparksAt = now;
        spawnImpact(center, item.type === "rock" ? 0x837c72 : item.type === "sawblade" ? 0xd3e0e4 : 0xb8c3c7, Math.min(18, 7 + hits * 3), item.type === "beam" ? 3.0 : 2.4);
      }
    }

    function updateHeldItemPose(t) {
      const item = player.heldItem;
      if (!item) {
        player.beamTrailPoints.length = 0;
        updateBeamTrailMesh();
        return;
      }

      if (player.spinAttack && canSpinAttack(item)) {
        updateSpinItemPose(item, t);
      } else if (input.aimHeld && !player.action) {
        item.def.aimPose(item);
      } else if (player.action && player.action.type === "melee") {
        item.def.meleePose(item, player.action.t / player.action.duration, player.action.comboStep || 0);
      } else {
        item.def.holdPose(item, t);
      }

      if (item.type === "beam" && ((player.action && player.action.type === "melee") || player.spinAttack)) {
        const handle = item.mesh.position.clone();
        const tip = new THREE.Vector3(0, -3.7, 0).applyQuaternion(item.mesh.quaternion).add(item.mesh.position);
        player.beamTrailPoints.push({
          handle: new THREE.Vector3(handle.x, 0, handle.z),
          tip: new THREE.Vector3(tip.x, 0, tip.z),
          y: -0.18,
        });
        while (player.beamTrailPoints.length > 24) player.beamTrailPoints.shift();
        updateBeamTrailMesh();
      } else {
        player.beamTrailPoints.length = 0;
        updateBeamTrailMesh();
      }
    }

    function updateMechPose(t, dt) {
      const walking = Math.hypot(player.velocity.x, player.velocity.z) > 0.5;
      const stride = walking ? Math.sin(player.walkAmount * 4.5) : Math.sin(t * 1.8) * 0.18;
      const bob = walking ? Math.abs(Math.sin(player.walkAmount * 4.5)) * 0.13 : Math.sin(t * 1.4) * 0.035;

      if (player.spinAttack && (!input.spinHeld || !canSpinAttack(player.heldItem) || player.action || input.aimHeld)) {
        endSpinAttack();
      }
      if (player.spinAttack) {
        player.spinAttack.t += dt;
        player.spinAttack.angle += dt * 10.8;
      }

      mech.upper.position.y = 2.25 + bob;
      mech.upper.rotation.set(0, player.spinAttack ? player.spinAttack.angle : -player.cameraYaw, 0);
      mech.upperPitch.rotation.set(player.spinAttack ? 0.04 : clamp(player.cameraPitch, -0.48, 0.58), 0, 0);
      mech.legs.rotation.y = -player.moveYaw;
      mech.core.rotation.z = walking ? stride * 0.05 : Math.sin(t * 1.4) * 0.025;
      mech.face.rotation.x = Math.PI / 2;

      mech.leftLeg.root.position.y = 2.48 + Math.max(0, stride) * 0.08;
      mech.rightLeg.root.position.y = 2.48 + Math.max(0, -stride) * 0.08;
      mech.leftLeg.root.rotation.x = -0.18 + stride * 0.24;
      mech.rightLeg.root.rotation.x = -0.18 - stride * 0.24;
      mech.leftLeg.knee.rotation.x = 0.46 + Math.max(0, -stride) * 0.34;
      mech.rightLeg.knee.rotation.x = 0.46 + Math.max(0, stride) * 0.34;

      setArmPose(mech.leftArm, 0.16 - stride * 0.14, 0, -0.36, 0.18);
      setArmPose(mech.rightArm, 0.16 + stride * 0.14, 0, 0.36, 0.18);

      const item = player.heldItem;
      if (item) {
        if (player.spinAttack) {
          if (item.type === "rock" || item.type === "sawblade") {
            setArmPose(mech.rightArm, 0.88, -0.18, 0.08, 0.86);
            setArmPose(mech.leftArm, 0.88, 0.18, -0.08, 0.86);
          } else {
            setArmPose(mech.rightArm, 0.46, -0.92, 0.26, 0.08);
            setArmPose(mech.leftArm, 0.18, 0.58, -0.48, 0.12);
          }
        } else if (input.aimHeld && !player.action) {
          if (item.type === "rock") {
            setArmPose(mech.leftArm, 0.88, 0.34, -0.18, 0.72);
            setArmPose(mech.rightArm, 0.88, -0.34, 0.18, 0.72);
          } else {
            setArmPose(mech.rightArm, -1.12, -0.24, 0.18, -0.26);
            setArmPose(mech.leftArm, 0.22, 0, -0.4, 0.12);
          }
        } else if (player.action && player.action.type === "melee") {
          const p = player.action.t / player.action.duration;
          if (item.type === "rock") {
            const wind = p < 0.42 ? smoothstep(p / 0.42) : 1 - smoothstep((p - 0.42) / 0.34);
            const smash = p < 0.42 ? 0 : smoothstep((p - 0.42) / 0.34);
            setArmPose(mech.leftArm, 0.86 + wind * 0.62 - smash * 1.05, 0.28, -0.18, 0.68 - smash * 0.42);
            setArmPose(mech.rightArm, 0.86 + wind * 0.62 - smash * 1.05, -0.28, 0.18, 0.68 - smash * 0.42);
          } else {
            const step = player.action.comboStep || 0;
            if (step === 2) {
              setArmPose(mech.rightArm, 1.05 - smoothstep(p) * 1.72, 0.02, 0.12, 0.2);
              setArmPose(mech.leftArm, 0.1, 0, -0.38, 0.1);
            } else {
              const dir = step === 1 ? -1 : 1;
              const side = dir * (0.78 - smoothstep(p) * 1.56);
              setArmPose(mech.rightArm, 0.76, side, dir * 0.18, 0.32);
              setArmPose(mech.leftArm, 0.18, 0, -0.38, 0.1);
            }
          }
        } else if (item.type === "rock") {
          setArmPose(mech.leftArm, 0.82, 0.3, -0.18, 0.68);
          setArmPose(mech.rightArm, 0.82, -0.3, 0.18, 0.68);
        } else {
          setArmPose(mech.rightArm, 0.76, -0.08, 0.2, 0.28);
          setArmPose(mech.leftArm, 0.14 - stride * 0.12, 0, -0.36, 0.16);
        }
      }

      updateHeldItemPose(t);
      if (player.spinAttack && item) {
        const spinHit = new THREE.Vector3(item.type === "beam" ? 2.7 : 0, 0.02, item.type === "beam" ? -0.34 : -1.62);
        mech.upperPitch.localToWorld(spinHit);
        hitSpinEnemies(spinHit, item);
      }

      if (player.action) {
        player.action.t += dt;

        if (player.action.type === "melee" && !player.action.hit) {
          const p = player.action.t / player.action.duration;
          const heldItem = player.heldItem;
          const hitAt = heldItem && heldItem.type === "rock" ? 0.62 : 0.48;
          if (p >= hitAt) {
            player.action.hit = true;
            const impact = new THREE.Vector3(0, 0.28, heldItem.type === "sawblade" ? -1.75 : -2.15);
            mech.upperPitch.localToWorld(impact);
            const forceDir = getThrowDirection();
            const radius = heldItem.type === "rock" ? 2.4 : heldItem.type === "sawblade" ? 2.75 : 3.8;
            forceDir.y = Math.max(forceDir.y, 0.35);
            forceDir.normalize();
            if (heldItem.type === "bomb") {
              explodeAt(impact, 7.0, 24, true, heldItem);
            } else if (heldItem.type === "heldEnemy") {
              hitSingleEnemy(impact, 2.25, forceDir.multiplyScalar(8), 2);
              squishHeldEnemyItem(heldItem, impact);
            } else if (heldItem.type === "gravitonBall") {
              knockEnemiesOnly(impact, 4.8, forceDir.multiplyScalar(24), 0.9);
            } else {
              damageImpaledEnemiesOnMelee(heldItem);
              hitEnemies(impact, radius, forceDir.multiplyScalar(heldItem.type === "rock" ? 6 : heldItem.type === "sawblade" ? 7 : 8), null, { meleeDamage: 1, deathLiftScale: 0.25, stunSeconds: 0.4, dismember: heldItem.type === "sawblade" });
              spawnImpact(impact, heldItem.type === "rock" ? 0x837c72 : heldItem.type === "sawblade" ? 0xd3e0e4 : 0xb8c3c7, heldItem.type === "rock" ? 22 : 14, heldItem.type === "rock" ? 5 : 3.2);
            }
          }
        }

        if (player.action.t >= player.action.duration) {
          player.action = null;
        }
      }
    }

    function applySawbladeCurve(item, dt, pos = null) {
      tmpVec.set(-item.velocity.z, 0, item.velocity.x);
      if (tmpVec.lengthSq() > 0.0001) {
        tmpVec.normalize().multiplyScalar((item.curveSide || 1) * (6.8 + Math.min(item.throwAge || 0, 1.8) * 4.2));
        item.velocity.addScaledVector(tmpVec, dt);
        const flatSpeed = Math.hypot(item.velocity.x, item.velocity.z);
        if (flatSpeed > 0.001) {
          const targetSpeed = item.sawFlatSpeed || flatSpeed;
          item.velocity.x *= targetSpeed / flatSpeed;
          item.velocity.z *= targetSpeed / flatSpeed;
        }
      }
      if (pos) {
        const targetY = heightAt(pos.x, pos.z) + item.def.groundOffset + 0.22 + (item.sawHeightOffset || 0);
        const correction = clamp((targetY - pos.y) * 7.5 - item.velocity.y * 0.85, -16, 16);
        item.velocity.y += correction * dt;
      }
      item.velocity.y -= item.def.throwGravity * dt;
    }

    function orientSawbladeProjectile(item, dt) {
      item.spinAngle = (item.spinAngle || 0) + item.spin.z * dt;
      item.mesh.rotation.set(Math.PI / 2, 0, item.spinAngle);
    }

    function captureEnemyInGraviton(enemy, item) {
      if (!item.gravitonCaptured) item.gravitonCaptured = [];
      if (enemy.gravitonItem === item || enemy.state !== "alive") return;

      const index = item.gravitonCaptured.length;
      const angle = index * 2.399 + Math.random() * 0.45;
      const ring = 0.9 + Math.sqrt(index + 1) * 0.22;
      enemy.gravitonItem = item;
      enemy.gravitonOffset = new THREE.Vector3(
        Math.cos(angle) * ring,
        0.36 + (index % 5) * 0.18,
        Math.sin(angle) * ring
      );
      enemy.gravitonPhase = Math.random() * TAU;
      enemy.velocity.set(0, 0, 0);
      enemy.stunT = 0;
      item.gravitonCaptured.push(enemy);
      spawnImpact(enemy.mesh.position, enemy.type === "bluePillar" ? 0x52b7ff : 0x9be36f, 6, 1.2);
    }

    function updateGravitonEnergyBeams(item) {
      let lines = item.mesh.userData.energyLines;
      if (!lines) {
        lines = new THREE.LineSegments(
          new THREE.BufferGeometry(),
          new THREE.LineBasicMaterial({ color: 0x9feaff, transparent: true, opacity: 0.86 })
        );
        item.mesh.userData.energyLines = lines;
        item.mesh.add(lines);
      }

      const captured = item.gravitonCaptured || [];
      const points = [];
      const beamCount = 18;
      const t = clock.elapsedTime;
      for (let i = 0; i < beamCount; i++) {
        const a = i * TAU / beamCount + t * 0.9;
        const y = Math.sin(i * 1.7 + t * 2.1) * 0.42;
        const dir = new THREE.Vector3(Math.cos(a), y, Math.sin(a)).normalize();
        let covered = false;
        for (const enemy of captured) {
          if (!enemy.gravitonOffset) continue;
          tmpVec.copy(enemy.gravitonOffset).normalize();
          if (tmpVec.dot(dir) > 0.64) {
            covered = true;
            break;
          }
        }
        if (covered) continue;
        points.push(dir.clone().multiplyScalar(0.58));
        points.push(dir.clone().multiplyScalar(1.35 + Math.sin(t * 8 + i) * 0.25));
      }

      lines.geometry.dispose();
      lines.geometry = new THREE.BufferGeometry().setFromPoints(points);
      lines.visible = points.length > 0;
      lines.material.opacity = clamp(0.18 + (beamCount - captured.length) / beamCount, 0.25, 0.86);
    }

    function updateCapturedGravitonEnemies(item, dt) {
      if (!item.gravitonCaptured) return;
      const ballPos = item.mesh.position;
      item.gravitonCaptured = item.gravitonCaptured.filter((enemy) => enemy.state === "alive" && enemy.gravitonItem === item);
      for (const enemy of item.gravitonCaptured) {
        enemy.gravitonControl = true;
        enemy.velocity.copy(item.velocity);
        const offset = enemy.gravitonOffset || new THREE.Vector3(1, 0.5, 0);
        tmpVec.copy(offset)
          .applyAxisAngle(new THREE.Vector3(0, 1, 0), item.gravitonRoll + enemy.gravitonPhase)
          .applyAxisAngle(new THREE.Vector3(1, 0, 0), Math.sin(item.gravitonRoll * 0.7 + enemy.gravitonPhase) * 0.7);
        const target = ballPos.clone().add(tmpVec);
        const groundY = heightAt(target.x, target.z) + enemy.groundOffset;
        target.y = Math.max(target.y, groundY + 0.12);
        enemy.mesh.position.lerp(target, 1 - Math.pow(0.0005, dt));
        enemy.mesh.rotation.x += dt * (7.5 + Math.abs(item.velocity.z) * 0.3);
        enemy.mesh.rotation.y += dt * (5.8 + enemy.gravitonPhase);
        enemy.mesh.rotation.z += dt * (6.4 + Math.abs(item.velocity.x) * 0.3);
        animateEnemyLimbs(enemy, clock.elapsedTime, 2.6);
      }
    }

    function burstGravitonBall(item) {
      const pos = item.mesh.position.clone();
      const affected = new Set(item.gravitonCaptured || []);
      for (const enemy of enemies) {
        if (enemy.state !== "alive") continue;
        if (enemy.mesh.position.distanceTo(pos) <= 6.4 + enemy.radius) affected.add(enemy);
      }

      for (const enemy of affected) {
        if (enemy.state !== "alive") continue;
        enemy.gravitonItem = null;
        enemy.gravitonOffset = null;
        enemy.gravitonControl = false;
        tmpVec.subVectors(enemy.mesh.position, pos);
        tmpVec.y = 0;
        if (tmpVec.lengthSq() < 0.0001) tmpVec.set(Math.random() - 0.5, 0, Math.random() - 0.5);
        const dist = Math.max(tmpVec.length(), 0.35);
        tmpVec.normalize().multiplyScalar(18 + Math.max(0, 6.4 - dist) * 2.4);
        tmpVec.y = 5.2 + Math.random() * 4.2;
        knockEnemy(enemy, tmpVec, enemy.type === "bluePillar" ? 1.4 : 1.0);
      }

      spawnShockwave(pos, 8.2);
      spawnImpact(pos, 0x9feaff, 110, 10.5);
      spawnGoo(pos, 0x52b7ff, 34);
      consumeItem(item);
    }

    function updateGravitonProjectile(item, dt) {
      item.gravitonAge = (item.gravitonAge || 0) + dt;
      item.gravitonRoll = (item.gravitonRoll || 0) + item.velocity.length() * dt * 0.75 + dt * 2.2;
      item.velocity.y = 0;
      item.velocity.x *= Math.pow(0.88, dt);
      item.velocity.z *= Math.pow(0.88, dt);
      item.mesh.position.addScaledVector(item.velocity, dt);
      item.mesh.position.x = clamp(item.mesh.position.x, -68, 68);
      item.mesh.position.z = clamp(item.mesh.position.z, -68, 68);
      item.mesh.position.y = heightAt(item.mesh.position.x, item.mesh.position.z) + item.def.groundOffset;
      const pillarHit = findPillarHit(item);
      if (pillarHit && clock.elapsedTime - (item.gravitonPillarBounceT || -100) > 0.12) {
        reflectGravitonFromPillar(item, pillarHit);
      }
      item.mesh.rotation.x += item.spin.x * dt + item.velocity.z * dt * 0.4;
      item.mesh.rotation.y += item.spin.y * dt;
      item.mesh.rotation.z += item.spin.z * dt - item.velocity.x * dt * 0.4;

      const pullRadius = 8.0;
      const captureRadius = 1.55 + Math.min(2.2, Math.sqrt((item.gravitonCaptured || []).length) * 0.22);
      for (const enemy of enemies) {
        if (enemy.state !== "alive" || enemy.gravitonItem === item) continue;
        const dist = enemy.mesh.position.distanceTo(item.mesh.position);
        if (dist > pullRadius + enemy.radius) continue;
        tmpVec.subVectors(item.mesh.position, enemy.mesh.position);
        tmpVec.y *= 0.35;
        const pull = (1 - clamp(dist / pullRadius, 0, 1)) * 24;
        if (tmpVec.lengthSq() > 0.0001) {
          tmpVec.normalize().multiplyScalar(pull * dt);
          enemy.mesh.position.add(tmpVec);
        }
        enemy.gravitonControl = true;
        enemy.stunT = 0;
        enemy.velocity.lerp(item.velocity, 0.25);
        enemy.mesh.position.y = Math.max(enemy.mesh.position.y, heightAt(enemy.mesh.position.x, enemy.mesh.position.z) + enemy.groundOffset);
        if (dist <= captureRadius + enemy.radius) captureEnemyInGraviton(enemy, item);
      }

      updateCapturedGravitonEnemies(item, dt);
      updateGravitonEnergyBeams(item);
      if (item.gravitonAge > 3.65) {
        burstGravitonBall(item);
      }
    }

    function updateProjectiles(dt) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const item = projectiles[i];
        item.throwAge = (item.throwAge || 0) + dt;
        if (item.type === "gravitonBall") {
          updateGravitonProjectile(item, dt);
          continue;
        }
        if (item.type === "sawblade") {
          if (!item.sawFlatSpeed) item.sawFlatSpeed = Math.hypot(item.velocity.x, item.velocity.z);
          applySawbladeCurve(item, dt, item.mesh.position);
        } else {
          item.velocity.y -= item.def.throwGravity * dt;
        }
        item.mesh.position.addScaledVector(item.velocity, dt);
        if (item.type === "sawblade") {
          orientSawbladeProjectile(item, dt);
        } else if (item.type === "beam" && item.velocity.lengthSq() > 0.01) {
          tmpQuat.setFromUnitVectors(new THREE.Vector3(0, -1, 0), item.velocity.clone().normalize());
          item.mesh.quaternion.copy(tmpQuat);
        } else {
          item.mesh.rotation.x += item.spin.x * dt;
          item.mesh.rotation.y += item.spin.y * dt;
          item.mesh.rotation.z += item.spin.z * dt;
        }

        if (item.type === "beacon" || item.type === "airstrikeBeacon") {
          let beaconHit = false;
          for (const enemy of enemies) {
            if (enemy.state !== "alive") continue;
            if (enemy.mesh.position.distanceTo(item.mesh.position) <= 1.15 + enemy.radius) {
              beaconHit = true;
              break;
            }
          }
          if (beaconHit) {
            if (item.type === "airstrikeBeacon") {
              deployAirstrikeBeacon(item);
            } else {
              deployOrbitalBeacon(item);
            }
            continue;
          }
        }

        if (item.type === "heldEnemy") {
          if (hitSingleEnemy(item.mesh.position, 1.25, item.velocity.clone().multiplyScalar(0.5), 2)) {
            squishHeldEnemyItem(item, item.mesh.position);
            continue;
          }
        }

        if (item.type === "fireBomb") {
          const oilPatch = findOilPatchAt(item.mesh.position);
          if (oilPatch) {
            detonateFireBomb(item, item.mesh.position);
            continue;
          }
          let fireHit = false;
          for (const enemy of enemies) {
            if (enemy.state !== "alive") continue;
            if (enemy.mesh.position.distanceTo(item.mesh.position) <= 1.1 + enemy.radius) {
              igniteEnemy(enemy, 4.0);
              fireHit = true;
            }
          }
          if (fireHit) {
            detonateFireBomb(item, item.mesh.position);
            continue;
          }
        }

        const hitRadius = item.type === "beam" ? 0.75 : 1.35;
        const impulse = item.velocity.clone().multiplyScalar(item.type === "beam" ? 0.75 : 0.55);
        const hitCenter = item.type === "beam" ? javelinTipWorld(item) : item.mesh.position;
        const noGenericHit = item.type === "beacon" || item.type === "airstrikeBeacon" || item.type === "heldEnemy" || item.type === "clusterMine" || item.type === "repulsorPad" || item.type === "oilDrum" || item.type === "fireBomb" || item.type === "teslaGenerator";
        const enemyHits = noGenericHit ? 0 : hitEnemies(hitCenter, item.type === "sawblade" ? 0.95 : hitRadius, impulse, item.type === "beam" ? item : null, { dismember: item.type === "sawblade" });
        if (item.type === "bomb" && enemyHits > 0) {
          explodeAt(item.mesh.position.clone(), 7.2, 24, false, item);
          continue;
        }

        const pillarHit = findPillarHit(item);
        if (pillarHit) {
          if (item.type === "bomb") {
            explodeAt(item.mesh.position.clone(), 7.2, 24, false, item);
          } else if (item.type === "sawblade") {
            embedSawbladeInPillar(item, pillarHit);
            projectiles.splice(i, 1);
          } else if (item.type === "repulsorPad") {
            deployRepulsorPad(item, pillarHit);
          } else if (item.type === "clusterMine") {
            deployClusterMine(item, pillarHit);
          } else if (item.type === "teslaGenerator") {
            deployTeslaGenerator(item, pillarHit);
          } else if (item.type === "rock" || item.type === "beacon" || item.type === "airstrikeBeacon") {
            knockItemOffPillar(item, pillarHit);
          } else {
            embedJavelinInPillar(item, pillarHit);
            projectiles.splice(i, 1);
          }
          continue;
        }

        const groundY = heightAt(item.mesh.position.x, item.mesh.position.z) + item.def.groundOffset;
        if (item.mesh.position.y <= groundY) {
          if (item.type === "heldEnemy") {
            item.mesh.position.y = groundY;
            ragdollHeldEnemyItem(item, item.velocity.clone().multiplyScalar(0.45));
            continue;
          }
          if (item.type === "airstrikeBeacon") {
            item.mesh.position.y = groundY;
            deployAirstrikeBeacon(item);
            continue;
          }
          if (item.type === "beacon") {
            item.mesh.position.y = groundY;
            deployOrbitalBeacon(item);
            continue;
          }
          if (item.type === "bomb") {
            item.mesh.position.y = groundY;
            explodeAt(item.mesh.position.clone(), 7.2, 24, false, item);
            continue;
          }
          if (item.type === "clusterMine") {
            item.mesh.position.y = groundY;
            deployClusterMine(item);
            continue;
          }
          if (item.type === "repulsorPad") {
            item.mesh.position.y = groundY;
            deployRepulsorPad(item);
            continue;
          }
          if (item.type === "oilDrum") {
            item.mesh.position.y = groundY;
            spillOilDrum(item);
            continue;
          }
          if (item.type === "fireBomb") {
            item.mesh.position.y = groundY;
            detonateFireBomb(item, item.mesh.position);
            continue;
          }
          if (item.type === "teslaGenerator") {
            item.mesh.position.y = groundY;
            deployTeslaGenerator(item);
            continue;
          }
          item.mesh.position.y = groundY;
          item.velocity.set(0, 0, 0);
          item.state = "free";
          item.embeddedInPillar = false;
          if (item.type === "beam") {
            const embedDir = new THREE.Vector3(0.25, -0.9, -0.35).normalize();
            tmpQuat.setFromUnitVectors(new THREE.Vector3(0, -1, 0), embedDir);
            item.mesh.quaternion.copy(tmpQuat);
          }
          projectiles.splice(i, 1);
          spawnImpact(item.mesh.position, item.type === "rock" ? 0x7d756b : 0xb8c3c7, item.type === "rock" ? 14 : 9, item.type === "rock" ? 3.2 : 2.4);
        }
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        if (p.isShockwave) {
          const scale = 1 + (1 - p.life / p.maxLife) * (p.expandScale - 1);
          p.scale.set(scale, scale, scale);
        } else {
          p.velocity.y -= 9.5 * dt;
          p.position.addScaledVector(p.velocity, dt);
        }
        if (p.spin) {
          p.rotation.x += p.spin.x * dt;
          p.rotation.y += p.spin.y * dt;
          p.rotation.z += p.spin.z * dt;
        }
        const fade = Math.max(0, p.life / p.maxLife);
        if (p.isDebris || p.isShockwave) {
          setObjectOpacity(p, fade);
        } else {
          p.material.opacity = fade;
        }
        if (p.life <= 0) {
          if (p.isBomblet) {
            explodeAt(p.position.clone(), 4.8, 18, false, null);
          }
          scene.remove(p);
          if (p.isDebris || p.isShockwave) {
            disposeObject(p);
          } else {
            p.geometry.dispose();
            p.material.dispose();
          }
          particles.splice(i, 1);
        }
      }
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        if (enemy.state === "alive") {
          if (enemy.type === "explosiveBug") {
            const playerDist = enemy.mesh.position.distanceTo(player.position);
            if (playerDist <= 1.55 + enemy.radius) {
              explodeExplosiveBug(enemy, enemy.mesh.position);
              continue;
            }
            if (playerDist < 6.2) {
              const near = 1 - clamp((playerDist - 1.55) / 4.65, 0, 1);
              updateExplosiveBugFlash(enemy, dt, 2.0 + near * 8.5, 0.28 + near * 0.38);
            } else {
              setExplosiveBugFlash(enemy, 0);
            }
          }
          if (enemy.burnT > 0) {
            enemy.burnT = Math.max(0, enemy.burnT - dt);
            if (!enemy.nextBurnSpark || clock.elapsedTime >= enemy.nextBurnSpark) {
              enemy.nextBurnSpark = clock.elapsedTime + 0.12 + Math.random() * 0.08;
              spawnImpact(enemy.mesh.position.clone().add(new THREE.Vector3(0, enemy.groundOffset * 0.45, 0)), 0xff6a24, 3, 0.9);
            }
            if (damageEnemyHeat(enemy, dt * 0.42, enemy.mesh.position)) continue;
          }
          if (enemy.gravitonControl) {
            enemy.gravitonControl = false;
            continue;
          }
          if (enemy.orbitalControl) {
            enemy.orbitalControl = false;
            animateEnemyLimbs(enemy, clock.elapsedTime, 2.4);
            continue;
          }
          animateEnemyLimbs(enemy, clock.elapsedTime, enemy.stunT > 0 ? 1.8 : 1);
          if (enemy.repulsorAirborne) {
            enemy.velocity.y -= 20 * dt;
            enemy.mesh.position.addScaledVector(enemy.velocity, dt);
            enemy.mesh.rotation.x += enemy.velocity.z * dt * 0.45;
            enemy.mesh.rotation.z -= enemy.velocity.x * dt * 0.45;
            const groundY = heightAt(enemy.mesh.position.x, enemy.mesh.position.z) + enemy.groundOffset;
            if (enemy.mesh.position.y <= groundY) {
              enemy.mesh.position.y = groundY;
              enemy.velocity.y = 0;
              enemy.repulsorAirborne = false;
              enemy.stunT = 0;
            } else {
              enemy.stunT = Math.max(enemy.stunT || 0, 0.2);
            }
            continue;
          }
          if (enemy.stunT > 0) {
            enemy.stunT = Math.max(0, enemy.stunT - dt);
            enemy.velocity.x *= Math.pow(0.08, dt);
            enemy.velocity.z *= Math.pow(0.08, dt);
            enemy.mesh.position.x += enemy.velocity.x * dt;
            enemy.mesh.position.z += enemy.velocity.z * dt;
            enemy.mesh.position.y = heightAt(enemy.mesh.position.x, enemy.mesh.position.z) + enemy.groundOffset;
            continue;
          }

          tmpVec.subVectors(player.position, enemy.mesh.position);
          tmpVec.y = 0;
          const dist = tmpVec.length();
          if (dist > 0.01) {
            tmpVec.multiplyScalar(1 / dist);
            const speed = enemy.speed * enemyOilSlowMultiplier(enemy);
            enemy.velocity.x = tmpVec.x * speed;
            enemy.velocity.z = tmpVec.z * speed;
            enemy.mesh.rotation.y = Math.atan2(tmpVec.x, tmpVec.z);
          }
          enemy.mesh.rotation.x *= Math.pow(0.001, dt);
          enemy.mesh.rotation.z *= Math.pow(0.001, dt);
          if (Math.abs(enemy.mesh.rotation.x) < 0.002) enemy.mesh.rotation.x = 0;
          if (Math.abs(enemy.mesh.rotation.z) < 0.002) enemy.mesh.rotation.z = 0;
          enemy.mesh.position.x += enemy.velocity.x * dt;
          enemy.mesh.position.z += enemy.velocity.z * dt;
          enemy.mesh.position.y = heightAt(enemy.mesh.position.x, enemy.mesh.position.z) + enemy.groundOffset;
          continue;
        }

        enemy.deathT += dt;
        if (enemy.impaledOn) {
          if (enemy.type === "explosiveBug") {
            const hits = enemy.explosiveFuseHits || 1;
            updateExplosiveBugFlash(enemy, dt, 3.4 + hits * 2.8, 0.22 + hits * 0.13);
          }
          animateEnemyLimbs(enemy, clock.elapsedTime, 2.2);
          if (typeof enemy.impaleTargetOffset === "number") {
            const dir = Math.sign(enemy.impaleTargetOffset - enemy.impaleOffset);
            const step = enemy.impaleSlideSpeed * dt;
            if (Math.abs(enemy.impaleTargetOffset - enemy.impaleOffset) <= step) {
              enemy.impaleOffset = enemy.impaleTargetOffset;
            } else {
              enemy.impaleOffset += dir * step;
            }
            enemy.mesh.position.x = enemy.impaleSideOffset || 0;
            enemy.mesh.position.y = enemy.impaleOffset;
          }
          continue;
        }

        animateEnemyLimbs(enemy, clock.elapsedTime, 1.6);
        if (!enemy.impaledOn) {
          enemy.velocity.y -= 11 * dt;
          enemy.mesh.position.addScaledVector(enemy.velocity, dt);
          enemy.mesh.rotation.x += enemy.spin.x * dt;
          enemy.mesh.rotation.y += enemy.spin.y * dt;
          enemy.mesh.rotation.z += enemy.spin.z * dt;
          const groundY = heightAt(enemy.mesh.position.x, enemy.mesh.position.z) + 0.2;
          if (enemy.mesh.position.y < groundY) {
            enemy.mesh.position.y = groundY;
            enemy.velocity.multiplyScalar(0.55);
            enemy.velocity.y = Math.abs(enemy.velocity.y) * 0.18;
          }
        }

        if (enemy.deathT > 1.6) {
          const fade = clamp(1 - (enemy.deathT - 1.6) / 2.2, 0, 1);
          setObjectOpacity(enemy.mesh, fade);
          enemy.mesh.position.y -= dt * 0.35;
        }
        if (enemy.deathT > 4.0) {
          scene.attach(enemy.mesh);
          scene.remove(enemy.mesh);
          disposeObject(enemy.mesh);
          enemies.splice(i, 1);
        }
      }
    }

    function updateCamera(dt) {
      const target = player.position.clone().add(new THREE.Vector3(0, 2.05, 0));
      const forward = new THREE.Vector3(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      const desired = target.clone()
        .addScaledVector(forward, -8.3)
        .add(new THREE.Vector3(0, 3.15, 0));

      camera.position.lerp(desired, 1 - Math.pow(0.001, dt));
      const look = target.clone().addScaledVector(forward, 8).add(new THREE.Vector3(0, player.cameraPitch * 7.2, 0));
      camera.lookAt(look);
    }

    function updateAimLine() {
      const item = player.heldItem;
      if (!input.aimHeld || !item || player.action) {
        aimLine.visible = false;
        return;
      }

      const start = new THREE.Vector3();
      item.mesh.getWorldPosition(start);
      const power = input.throwCharging ? player.throwCharge : 0.18;
      const velocity = item.def.throwVelocity(getThrowDirection(), power);
      const points = [];
      const step = 0.085;
      const sim = start.clone();
      const vel = velocity.clone();
      const throwDir = getThrowDirection();
      const gravitonPreview = item.type === "gravitonBall";
      const previewItem = item.type === "sawblade" ? {
        type: "sawblade",
        def: item.def,
        velocity: vel,
        curveSide: -1,
        throwAge: 0,
        sawFlatSpeed: Math.hypot(vel.x, vel.z),
        sawHeightOffset: clamp(throwDir.y * 6.5, -0.1, 4.4),
      } : null;

      for (let i = 0; i < 28; i++) {
        points.push(sim.clone());
        if (gravitonPreview) {
          vel.y = 0;
          vel.x *= Math.pow(0.88, step);
          vel.z *= Math.pow(0.88, step);
          sim.y = heightAt(sim.x, sim.z) + item.def.groundOffset;
        } else if (previewItem) {
          previewItem.throwAge += step;
          applySawbladeCurve(previewItem, step, sim);
        } else {
          vel.y -= item.def.throwGravity * step;
        }
        sim.addScaledVector(vel, step);
        if (gravitonPreview) sim.y = heightAt(sim.x, sim.z) + item.def.groundOffset;
        if (sim.y < heightAt(sim.x, sim.z) + item.def.groundOffset) break;
      }

      aimLine.geometry.dispose();
      aimLine.geometry = new THREE.BufferGeometry().setFromPoints(points);
      aimLine.visible = true;
    }

    function updateHud() {
      const held = player.heldItem ? player.heldItem.def.label : "None";
      heldStatus.textContent = held;
      targetStatus.textContent = highlightedItem ? highlightedItem.def.label : highlightedEnemy ? "Enemy" : "None";

      if (!document.pointerLockElement) {
        actionStatus.textContent = "Click to control";
      } else if (input.throwCharging && player.heldItem && !player.action) {
        actionStatus.textContent = "Charging throw " + Math.round(player.throwCharge * 100) + "%";
      } else if (player.spinAttack) {
        actionStatus.textContent = "Spin attack";
      } else if (input.aimHeld && player.heldItem && !player.action) {
        actionStatus.textContent = "Aiming throw";
      } else if (player.action) {
        actionStatus.textContent = player.action.type === "melee" ? "Melee" : "Picking up";
      } else {
        actionStatus.textContent = "Ready";
      }

      reticle.classList.toggle("pickup", Boolean((highlightedItem || highlightedEnemy) && !player.heldItem));
      prompt.textContent = highlightedItem && !player.heldItem
        ? "F Pick up " + highlightedItem.def.label
        : highlightedEnemy && !player.heldItem
          ? "F Grab enemy"
          : "";
    }

    function tick() {
      const dt = Math.min(clock.getDelta(), 0.033);
      const t = clock.elapsedTime;

      if (input.pickupQueued) {
        pickupOrDrop();
        input.pickupQueued = false;
      }
      updatePendingMeleeHold(dt);
      if (input.meleeQueued) {
        beginMelee();
        input.meleeQueued = false;
      }

      updateMovement(dt);
      updateMechPose(t, dt);
      updateProjectiles(dt);
      updateOrbitalStrikes(dt);
      updateAirstrikes(dt);
      updateEnemies(dt);
      updateDeployedMines(dt);
      updateRepulsorPads(dt);
      updateTeslaGenerators(dt);
      updateChargedMetalItems(dt);
      updateHazards(dt);
      updateParticles(dt);
      updateCamera(dt);
      updateHighlight();
      updateAimLine();
      updateHud();

      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    function setKey(e, isDown) {
      const key = e.key.toLowerCase();
      if (key === "w" || e.key === "ArrowUp") input.forward = isDown;
      if (key === "s" || e.key === "ArrowDown") input.back = isDown;
      if (key === "a" || e.key === "ArrowLeft") input.left = isDown;
      if (key === "d" || e.key === "ArrowRight") input.right = isDown;
      if (isDown && key === "f") input.pickupQueued = true;
      if (isDown && key === "v") input.meleeQueued = true;
      if (isDown && key === "g") spawnEnemyCluster(50);
    }

    window.addEventListener("keydown", (e) => {
      if (["KeyW", "KeyA", "KeyS", "KeyD", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "KeyF", "KeyV", "KeyG"].includes(e.code)) {
        e.preventDefault();
      }
      setKey(e, true);
    });

    window.addEventListener("keyup", (e) => {
      setKey(e, false);
    });

    renderer.domElement.addEventListener("click", () => {
      if (!document.pointerLockElement) {
        const lockRequest = renderer.domElement.requestPointerLock();
        if (lockRequest && typeof lockRequest.catch === "function") {
          lockRequest.catch(() => {});
        }
      }
    });

    renderer.domElement.addEventListener("contextmenu", (e) => e.preventDefault());

    renderer.domElement.addEventListener("mousedown", (e) => {
      if (e.button === 2 && player.heldItem && !player.action) {
        input.aimHeld = true;
        player.throwCharge = 0;
      }
      if (e.button === 0 && input.aimHeld && player.heldItem && !player.action) {
        input.throwCharging = true;
        player.throwCharge = 0;
      } else if (e.button === 0 && player.heldItem && !player.action && !input.aimHeld) {
        if (canSpinAttack(player.heldItem)) {
          input.meleeHoldPending = true;
          input.meleeHoldTime = 0;
        } else {
          input.meleeQueued = true;
        }
      }
    });

    renderer.domElement.addEventListener("mouseup", (e) => {
      if (e.button === 0 && input.throwCharging) {
        throwHeldItem(Math.max(0.18, player.throwCharge));
      } else if (e.button === 0 && releasePendingMeleeHold()) {
        return;
      } else if (e.button === 0 && input.spinHeld) {
        endSpinAttack();
      }
      if (e.button === 2) {
        input.aimHeld = false;
        input.throwCharging = false;
        player.throwCharge = 0;
      }
    });

    document.addEventListener("pointerlockchange", () => {
      document.body.classList.toggle("locked", Boolean(document.pointerLockElement));
      if (!document.pointerLockElement) {
        input.aimHeld = false;
        input.throwCharging = false;
        cancelPendingMeleeHold();
        endSpinAttack();
        player.throwCharge = 0;
      }
    });

    document.addEventListener("mousemove", (e) => {
      if (!document.pointerLockElement) return;
      player.cameraYaw += e.movementX * 0.0022;
      player.cameraPitch = clamp(player.cameraPitch - e.movementY * 0.0018, -0.58, 0.72);
    });

    window.addEventListener("blur", () => {
      input.forward = false;
      input.back = false;
      input.left = false;
      input.right = false;
      input.aimHeld = false;
      input.throwCharging = false;
      cancelPendingMeleeHold();
      endSpinAttack();
      player.throwCharge = 0;
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    tick();
  </script>
</body>
</html>
