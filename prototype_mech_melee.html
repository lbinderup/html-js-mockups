<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3D Mech Melee Prototype</title>
  <style>
    :root {
      --panel: rgba(8, 12, 16, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --text: #eef4f0;
      --muted: rgba(238, 244, 240, 0.72);
      --accent: #f2cc66;
      --ok: #7ff0a6;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0d1216;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      inset: 18px 18px auto 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      pointer-events: none;
    }

    .panel {
      max-width: min(430px, calc(100vw - 36px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.34);
      padding: 12px 14px;
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    .status {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .status b {
      color: var(--text);
      font-weight: 700;
    }

    .keys {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .key {
      color: var(--text);
      font-weight: 800;
    }

    .reticle {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.72);
      transition: background 120ms ease, box-shadow 120ms ease;
    }

    .reticle::before {
      left: 9px;
      top: 0;
      width: 2px;
      height: 20px;
    }

    .reticle::after {
      left: 0;
      top: 9px;
      width: 20px;
      height: 2px;
    }

    .reticle.pickup::before,
    .reticle.pickup::after {
      background: var(--ok);
      box-shadow: 0 0 14px rgba(127, 240, 166, 0.9);
    }

    .prompt {
      position: fixed;
      left: 50%;
      top: calc(50% + 28px);
      transform: translateX(-50%);
      min-height: 18px;
      color: var(--ok);
      font-size: 13px;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    .lock {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }

    .locked .lock {
      opacity: 0;
    }

    @media (max-width: 720px) {
      .hud {
        inset: 10px 10px auto 10px;
        flex-direction: column;
      }

      .panel {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="panel">
      <div class="title">Mech Melee Prototype</div>
      <div class="status">
        <span>Held</span><b id="heldStatus">None</b>
        <span>Action</span><b id="actionStatus">Ready</b>
        <span>Target</span><b id="targetStatus">None</b>
      </div>
    </div>

    <div class="panel">
      <div class="keys">
        <div><span class="key">Click</span> pointer lock</div>
        <div><span class="key">WASD</span> move, <span class="key">mouse</span> look</div>
        <div><span class="key">F</span> pick up looked-at item</div>
        <div><span class="key">V</span> melee with held item</div>
        <div><span class="key">Hold RMB</span> aim, <span class="key">hold LMB</span> charge throw</div>
        <div><span class="key">G</span> spawn enemy cluster</div>
      </div>
    </div>
  </div>

  <div id="reticle" class="reticle"></div>
  <div id="prompt" class="prompt"></div>
  <div class="lock">Click the scene to take control</div>

  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";

    const TAU = Math.PI * 2;
    const clock = new THREE.Clock();
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9eb6c4);
    scene.fog = new THREE.Fog(0x9eb6c4, 36, 105);

    const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 260);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const heldStatus = document.getElementById("heldStatus");
    const actionStatus = document.getElementById("actionStatus");
    const targetStatus = document.getElementById("targetStatus");
    const reticle = document.getElementById("reticle");
    const prompt = document.getElementById("prompt");

    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);
    const tmpVec = new THREE.Vector3();
    const tmpVec2 = new THREE.Vector3();
    const tmpQuat = new THREE.Quaternion();

    const input = {
      forward: false,
      back: false,
      left: false,
      right: false,
      meleeQueued: false,
      pickupQueued: false,
      aimHeld: false,
      throwCharging: false,
    };

    const player = {
      position: new THREE.Vector3(0, 0, 0),
      velocity: new THREE.Vector3(),
      knockback: new THREE.Vector3(),
      yaw: 0,
      moveYaw: 0,
      cameraYaw: 0,
      cameraPitch: 0.18,
      speed: 8.5,
      walkAmount: 0,
      heldItem: null,
      action: null,
      throwCharge: 0,
      meleeCombo: 0,
      comboUntil: 0,
      beamTrailPoints: [],
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function smoothstep(t) {
      t = clamp(t, 0, 1);
      return t * t * (3 - 2 * t);
    }

    function normalizeAngle(angle) {
      return Math.atan2(Math.sin(angle), Math.cos(angle));
    }

    function heightAt(x, z) {
      return Math.sin(x * 0.13) * 1.25
        + Math.cos(z * 0.11) * 1.1
        + Math.sin((x + z) * 0.07) * 0.85
        + Math.cos((x - z) * 0.19) * 0.28;
    }

    function terrainNormalAt(x, z) {
      const e = 0.35;
      const hL = heightAt(x - e, z);
      const hR = heightAt(x + e, z);
      const hD = heightAt(x, z - e);
      const hU = heightAt(x, z + e);
      return new THREE.Vector3(hL - hR, 2 * e, hD - hU).normalize();
    }

    function createTerrain() {
      const size = 150;
      const segments = 120;
      const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
      geometry.rotateX(-Math.PI / 2);
      const pos = geometry.attributes.position;

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        pos.setY(i, heightAt(x, z));
      }

      geometry.computeVertexNormals();
      const material = new THREE.MeshStandardMaterial({
        color: 0x526f51,
        roughness: 0.92,
        metalness: 0,
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.receiveShadow = true;
      scene.add(mesh);

      const grid = new THREE.GridHelper(size, 30, 0x2d3f33, 0x405c45);
      grid.position.y = 0.05;
      grid.material.opacity = 0.17;
      grid.material.transparent = true;
      scene.add(grid);
    }

    function createLimbSegment(radius, length, color) {
      const geometry = new THREE.CylinderGeometry(radius, radius * 0.78, length, 12);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.58,
        metalness: 0.42,
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.y = -length * 0.5;
      return mesh;
    }

    function createMech() {
      const group = new THREE.Group();
      scene.add(group);
      const upper = new THREE.Group();
      upper.position.y = 2.25;
      group.add(upper);
      const upperPitch = new THREE.Group();
      upper.add(upperPitch);
      const legs = new THREE.Group();
      group.add(legs);

      const dark = 0x4d6268;
      const metal = 0x8d9da1;
      const accent = 0xf2cc66;

      const core = new THREE.Mesh(
        new THREE.SphereGeometry(0.92, 32, 22),
        new THREE.MeshStandardMaterial({ color: 0x62777c, roughness: 0.42, metalness: 0.5 })
      );
      core.scale.set(1.16, 1.0, 0.98);
      core.castShadow = true;
      core.receiveShadow = true;
      upperPitch.add(core);

      const face = new THREE.Mesh(
        new THREE.CylinderGeometry(0.42, 0.42, 0.16, 24),
        new THREE.MeshStandardMaterial({ color: accent, emissive: 0x332100, roughness: 0.28, metalness: 0.2 })
      );
      face.rotation.x = Math.PI / 2;
      face.position.set(0, 0.08, -0.88);
      face.castShadow = true;
      upperPitch.add(face);

      function makeArm(side) {
        const root = new THREE.Group();
        root.position.set(side * 0.88, 0.3, -0.02);
        upperPitch.add(root);

        const shoulder = new THREE.Mesh(
          new THREE.SphereGeometry(0.24, 16, 12),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.5, metalness: 0.45 })
        );
        shoulder.castShadow = true;
        root.add(shoulder);

        const upperArm = createLimbSegment(0.17, 1.12, metal);
        root.add(upperArm);

        const elbow = new THREE.Group();
        elbow.position.y = -1.08;
        root.add(elbow);

        const joint = new THREE.Mesh(
          new THREE.SphereGeometry(0.2, 14, 10),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.5, metalness: 0.45 })
        );
        joint.castShadow = true;
        elbow.add(joint);

        const fore = createLimbSegment(0.15, 1.28, metal);
        elbow.add(fore);

        const hand = new THREE.Mesh(
          new THREE.BoxGeometry(0.34, 0.22, 0.42),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.55, metalness: 0.35 })
        );
        hand.position.y = -1.3;
        hand.castShadow = true;
        elbow.add(hand);

        return { root, elbow, hand };
      }

      function makeLeg(side) {
        const root = new THREE.Group();
        root.position.set(side * 0.52, 2.52, 0.1);
        legs.add(root);

        const upperLeg = createLimbSegment(0.18, 1.08, metal);
        root.add(upperLeg);

        const knee = new THREE.Group();
        knee.position.y = -1.04;
        root.add(knee);

        const joint = new THREE.Mesh(
          new THREE.SphereGeometry(0.18, 14, 10),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.5, metalness: 0.45 })
        );
        joint.castShadow = true;
        knee.add(joint);

        const lower = createLimbSegment(0.16, 1.05, metal);
        knee.add(lower);

        const foot = new THREE.Mesh(
          new THREE.BoxGeometry(0.48, 0.2, 0.78),
          new THREE.MeshStandardMaterial({ color: dark, roughness: 0.58, metalness: 0.3 })
        );
        foot.position.set(0, -1.03, -0.18);
        foot.castShadow = true;
        knee.add(foot);

        return { root, knee, foot };
      }

      return {
        group,
        upper,
        upperPitch,
        legs,
        core,
        face,
        leftArm: makeArm(-1),
        rightArm: makeArm(1),
        leftLeg: makeLeg(-1),
        rightLeg: makeLeg(1),
      };
    }

    const mech = createMech();

    function createRockMesh() {
      const group = new THREE.Group();
      const rock = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.56, 1),
        new THREE.MeshStandardMaterial({ color: 0x69665e, roughness: 0.96, metalness: 0.03, flatShading: true })
      );
      rock.scale.set(1.18, 0.9, 1.0);
      rock.castShadow = true;
      rock.receiveShadow = true;
      group.add(rock);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.9, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createBeamMesh() {
      const group = new THREE.Group();
      const beam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.11, 0.15, 3.7, 12),
        new THREE.MeshStandardMaterial({ color: 0x9da6a9, roughness: 0.48, metalness: 0.72 })
      );
      beam.position.y = -1.85;
      beam.castShadow = true;
      beam.receiveShadow = true;
      group.add(beam);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.46, 0.36, 0.38),
        new THREE.MeshStandardMaterial({ color: 0x6f787c, roughness: 0.58, metalness: 0.65 })
      );
      head.position.y = 0;
      head.castShadow = true;
      group.add(head);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(1.0, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      collider.position.y = -1.45;
      group.add(collider);
      return group;
    }

    function createBombMesh() {
      const group = new THREE.Group();
      const shell = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 18, 14),
        new THREE.MeshStandardMaterial({ color: 0x25292c, roughness: 0.62, metalness: 0.22 })
      );
      shell.castShadow = true;
      shell.receiveShadow = true;
      group.add(shell);

      const band = new THREE.Mesh(
        new THREE.TorusGeometry(0.37, 0.035, 8, 22),
        new THREE.MeshStandardMaterial({ color: 0xe0b94f, roughness: 0.42, metalness: 0.35 })
      );
      band.rotation.x = Math.PI / 2;
      band.castShadow = true;
      group.add(band);

      const fuse = new THREE.Mesh(
        new THREE.CylinderGeometry(0.045, 0.055, 0.38, 8),
        new THREE.MeshStandardMaterial({ color: 0x5b3b24, roughness: 0.8, metalness: 0.02 })
      );
      fuse.position.y = 0.48;
      fuse.rotation.z = 0.28;
      fuse.castShadow = true;
      group.add(fuse);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createSawbladeMesh() {
      const group = new THREE.Group();
      const blade = new THREE.Mesh(
        new THREE.CylinderGeometry(0.62, 0.62, 0.12, 28),
        new THREE.MeshStandardMaterial({ color: 0xb7c0c5, roughness: 0.34, metalness: 0.78, flatShading: true })
      );
      blade.rotation.x = Math.PI / 2;
      blade.castShadow = true;
      blade.receiveShadow = true;
      group.add(blade);

      const hub = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.16, 18),
        new THREE.MeshStandardMaterial({ color: 0x5e686d, roughness: 0.45, metalness: 0.7 })
      );
      hub.rotation.x = Math.PI / 2;
      hub.castShadow = true;
      group.add(hub);

      for (let i = 0; i < 12; i++) {
        const tooth = new THREE.Mesh(
          new THREE.BoxGeometry(0.11, 0.12, 0.22),
          new THREE.MeshStandardMaterial({ color: 0xd0d7da, roughness: 0.3, metalness: 0.82 })
        );
        const a = i * TAU / 12;
        tooth.position.set(Math.cos(a) * 0.66, Math.sin(a) * 0.66, 0);
        tooth.rotation.z = a;
        tooth.castShadow = true;
        group.add(tooth);
      }

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.95, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createBeaconMesh() {
      const group = new THREE.Group();
      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.32, 0.42, 0.22, 12),
        new THREE.MeshStandardMaterial({ color: 0x263547, roughness: 0.5, metalness: 0.48 })
      );
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      const lens = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 14, 10),
        new THREE.MeshStandardMaterial({ color: 0xaee8ff, emissive: 0x1a7aff, roughness: 0.2, metalness: 0.1 })
      );
      lens.position.y = 0.22;
      lens.castShadow = true;
      group.add(lens);

      const antenna = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.035, 0.62, 8),
        new THREE.MeshStandardMaterial({ color: 0x8295a0, roughness: 0.42, metalness: 0.65 })
      );
      antenna.position.set(0.2, 0.42, -0.08);
      antenna.rotation.z = -0.22;
      antenna.castShadow = true;
      group.add(antenna);

      const collider = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 12, 8),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      group.add(collider);
      return group;
    }

    function createAirstrikeBeaconMesh() {
      const group = createBeaconMesh();
      group.traverse((child) => {
        if (!child.material || !child.material.color) return;
        child.material = child.material.clone();
        if (child.material.emissive) child.material.emissive.setHex(0x662000);
        child.material.color.setHex(child.material.emissive ? 0xff8844 : 0x3f2f26);
      });

      const fin = new THREE.Mesh(
        new THREE.ConeGeometry(0.22, 0.34, 3),
        new THREE.MeshStandardMaterial({ color: 0xffb34d, emissive: 0x3a1600, roughness: 0.38, metalness: 0.24 })
      );
      fin.position.y = 0.42;
      fin.rotation.x = Math.PI / 2;
      fin.castShadow = true;
      group.add(fin);
      return group;
    }

    function setBeamBladePose(item, x, y, z, dirX, dirY, dirZ) {
      item.mesh.position.set(x, y, z);
      tmpVec.set(dirX, dirY, dirZ).normalize();
      item.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, -1, 0), tmpVec);
    }

    const itemDefs = {
      rock: {
        label: "Clunky rock",
        groundOffset: 0.52,
        throwGravity: 24,
        createMesh: createRockMesh,
        holdPose(item, t) {
          item.mesh.position.set(0, 0.68, -1.28);
          item.mesh.rotation.set(-0.18, 0.2 + t * 0.18, 0);
        },
        aimPose(item) {
          item.mesh.position.set(0, 0.92, -1.42);
          item.mesh.rotation.set(-0.36, 0.34, 0);
        },
        meleePose(item, progress) {
          if (progress < 0.42) {
            const a = smoothstep(progress / 0.42);
            item.mesh.position.set(0, -0.28 + a * 1.3, -0.95 + a * 0.35);
            item.mesh.rotation.set(-0.7 * a, 0.5 * a, 0);
          } else {
            const a = smoothstep((progress - 0.42) / 0.34);
            item.mesh.position.set(0, 1.02 - a * 1.72, -0.6 - a * 1.32);
            item.mesh.rotation.set(-0.7 + a * 1.45, 0.5, 0);
          }
        },
        throwVelocity(dir) {
          const power = arguments.length > 1 ? arguments[1] : 1;
          const flat = dir.clone();
          flat.y = 0;
          flat.normalize();
          return flat.multiplyScalar(7.5 + power * 7.5).add(new THREE.Vector3(0, 7.8 + power * 6.0 + Math.max(0, dir.y) * 4, 0));
        },
      },
      beam: {
        label: "Long metal beam",
        groundOffset: 0.16,
        throwGravity: 8.5,
        createMesh: createBeamMesh,
        holdPose(item, t) {
          setBeamBladePose(item, 0.84, -0.18, -0.86, 0.34, 1.05, -0.72);
        },
        aimPose(item) {
          setBeamBladePose(item, 0.82, -0.28, -1.0, 0.06, 0.05, -1);
        },
        meleePose(item, progress, comboStep = 0) {
          const p = smoothstep(progress);
          if (comboStep === 2) {
            setBeamBladePose(item, 0.76, 0.08 - p * 0.22, -0.88, 0.08, 1.0 - p * 1.85, -0.85 - p * 0.38);
            return;
          }

          const dir = comboStep === 1 ? -1 : 1;
          const angle = dir * (-Math.PI / 2 + p * Math.PI);
          setBeamBladePose(item, 0.78, -0.18, -0.9, Math.sin(angle), 0.02, -Math.cos(angle));
        },
        throwVelocity(dir) {
          const power = arguments.length > 1 ? arguments[1] : 1;
          const v = dir.clone().normalize().multiplyScalar(21 + power * 24);
          v.y = 1.1 + power * 3.2 + Math.max(-0.12, dir.y) * 3.2;
          return v;
        },
      },
      bomb: {
        label: "Impact bomb",
        groundOffset: 0.48,
        throwGravity: 16,
        createMesh: createBombMesh,
        holdPose(item, t) {
          item.mesh.position.set(0.16, 0.66, -1.18);
          item.mesh.rotation.set(0.1, t * 0.5, -0.14);
        },
        aimPose(item) {
          item.mesh.position.set(0.12, 0.82, -1.34);
          item.mesh.rotation.set(-0.18, 0.25, -0.08);
        },
        meleePose(item, progress) {
          const p = smoothstep(progress);
          item.mesh.position.set(0.18, 0.5 - p * 0.34, -1.0 - p * 1.15);
          item.mesh.rotation.set(-0.25 + p * 1.1, 0.45 + p * 0.8, -0.18);
        },
        throwVelocity(dir) {
          const power = arguments.length > 1 ? arguments[1] : 1;
          return dir.clone().normalize().multiplyScalar(11 + power * 13).add(new THREE.Vector3(0, 4.8 + power * 4.2, 0));
        },
      },
      sawblade: {
        label: "Curving sawblade",
        groundOffset: 0.18,
        throwGravity: 2.2,
        createMesh: createSawbladeMesh,
        holdPose(item, t) {
          item.mesh.position.set(0.78, -0.08, -0.86);
          item.mesh.rotation.set(Math.PI / 2, 0, t * 3.5);
        },

    function addCrabLimbs(body, isBluePillar) {
      if (!isBluePillar) return [];
      const color = 0x235aa4;
      const limbs = [];
      for (let i = 0; i < 4; i++) {
        const side = i % 2 ? -1 : 1;
        const row = Math.floor(i / 2) ? 1 : -1;
        const root = new THREE.Group();
        root.position.set(side * 0.48, 0.44, row * 0.38);
        root.rotation.set(0.22, side * 0.28, side * 0.34);
        root.userData.baseRotation = root.rotation.clone();
        root.userData.phase = i * 1.61;
        body.add(root);

        const joint = new THREE.Mesh(
          new THREE.SphereGeometry(0.13, 12, 8),
          new THREE.MeshStandardMaterial({ color: 0x4ea7f2, roughness: 0.58, metalness: 0.12 })
        );
        joint.castShadow = true;
        joint.receiveShadow = true;
        root.add(joint);

        const dangler = createDanglingLimb(0.86, 0.055, color);
        dangler.position.y = -0.43;
        root.add(dangler);

        limbs.push(root);
      }
      return limbs;
    }

    function animateEnemyLimbs(enemy, t, intensity = 1) {
      for (let i = 0; i < enemy.limbs.length; i++) {
        const limb = enemy.limbs[i];
        if (limb.detached || !limb.parent) continue;
        const base = limb.userData.baseRotation;
        const phase = limb.userData.phase || 0;
        if (enemy.state === "dead") {
          limb.rotation.x = 0.95 + Math.sin(t * 2.2 + phase) * 0.16 * intensity;
          limb.rotation.y = base.y + Math.sin(t * 1.7 + phase) * 0.22 * intensity;
          limb.rotation.z = base.z + Math.cos(t * 2.4 + phase) * 0.26 * intensity;
        } else {
          limb.rotation.x = base.x + Math.sin(t * 2.8 + phase) * 0.04 * intensity;
          limb.rotation.y = base.y + Math.sin(t * 2.1 + phase) * 0.05 * intensity;
          limb.rotation.z = base.z + Math.cos(t * 2.6 + phase) * 0.07 * intensity;
        }
      }
    }

    function updateBeamTrailMesh() {
      if (player.beamTrailPoints.length < 2) {
        beamTrail.visible = false;
        return;
      }

      const verts = [];
      const indices = [];
      const steps = 5;
      for (let i = 0; i < player.beamTrailPoints.length; i++) {
        const sample = player.beamTrailPoints[i];
        for (let j = 0; j < steps; j++) {
          const a = j / (steps - 1);
          const x = sample.handle.x + (sample.tip.x - sample.handle.x) * a;
          const z = sample.handle.z + (sample.tip.z - sample.handle.z) * a;
          verts.push(x, sample.y, z);
        }

        if (i < player.beamTrailPoints.length - 1) {
          const row = i * steps;
          const next = (i + 1) * steps;
          for (let j = 0; j < steps - 1; j++) {
            indices.push(row + j, row + j + 1, next + j, row + j + 1, next + j + 1, next + j);
          }
        }
      }

      beamTrail.geometry.dispose();
      beamTrail.geometry = new THREE.BufferGeometry();
      beamTrail.geometry.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
      beamTrail.geometry.setIndex(indices);
      beamTrail.visible = true;
    }

      if (!player.heldItem || player.action || input.aimHeld) return;

        player.meleeCombo = 0;
        player.comboUntil = 0;
        startAction("melee", 0.58, { comboStep: 0 });
        return;
      }
      if (player.heldItem.type === "beam" || player.heldItem.type === "sawblade") {
        const now = clock.elapsedTime;
        const comboCount = player.heldItem.type === "sawblade" ? 2 : 3;
        player.meleeCombo = now <= player.comboUntil ? (player.meleeCombo + 1) % comboCount : 0;
        player.comboUntil = now + 1.05;
        startAction("melee", player.heldItem.type === "beam" && player.meleeCombo === 2 ? 0.82 : 0.58, { comboStep: player.meleeCombo });
        return;

      player.meleeCombo = 0;
      player.comboUntil = 0;
      startAction("melee", 0.86, { comboStep: 0 });
    }

    function getThrowDirection() {
      const flat = new THREE.Vector3(Math.sin(player.cameraYaw), 0, -Math.cos(player.cameraYaw));
      const pitch = clamp(player.cameraPitch, -0.58, 0.72);
      return flat.multiplyScalar(Math.cos(pitch)).add(new THREE.Vector3(0, Math.sin(pitch), 0)).normalize();

    function throwHeldItem(power = 1) {
      const item = player.heldItem;
      if (!item || player.action) return;

      const worldPos = new THREE.Vector3();
      const worldQuat = new THREE.Quaternion();
      item.mesh.getWorldPosition(worldPos);
      item.mesh.getWorldQuaternion(worldQuat);
      scene.attach(item.mesh);
      item.mesh.position.copy(worldPos);
      item.mesh.quaternion.copy(worldQuat);

      const dir = getThrowDirection();
      item.velocity.copy(item.def.throwVelocity(dir, power));
      if (item.type === "heldEnemy") {
        item.spin.set(5.2, 2.8, 6.4);
        item.state = "thrown";
        item.throwAge = 0;
        projectiles.push(item);
        player.heldItem = null;

        input.throwCharging = false;
        spawnGoo(worldPos, item.enemyType === "bluePillar" ? 0x52b7ff : 0x9be36f, 8);
        return;
      }
      if (item.type === "sawblade") {
        item.spin.set(0, 0, 24);
      } else {
        item.spin.set(
          item.type === "rock" ? 1.7 : 5.4,
          item.type === "rock" ? 1.2 : 2.0,
          item.type === "rock" ? 0.7 : 8.2
